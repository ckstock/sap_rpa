<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SAP 自动化执行门户</title>
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
  <style>
    * { box-sizing: border-box; }
    :root {
      --bg: #f5f7fa;
      --panel: #ffffff;
      --panel-soft: #fafcff;
      --line: #e5e7eb;
      --line-strong: #cbd5e1;
      --text: #1f2937;
      --muted: #667085;
      --nav: #001529;
      --nav-soft: #002140;
      --blue: #1890ff;
      --blue-dark: #096dd9;
      --green: #16a34a;
      --amber: #d97706;
      --red: #dc2626;
      --cyan: #0891b2;
      --shadow: 0 8px 24px rgba(15, 23, 42, 0.08);
      --radius: 8px;
    }
    html, body { margin: 0; min-height: 100%; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", Arial, sans-serif;
      letter-spacing: 0;
    }
    button, input, select, textarea { font: inherit; }
    button { cursor: pointer; }
    .icon { width: 17px; height: 17px; flex: 0 0 auto; }
    .hidden { display: none !important; }

    .login-page {
      min-height: 100vh;
      display: grid;
      grid-template-columns: minmax(360px, 440px) minmax(0, 1fr);
      background:
        linear-gradient(135deg, rgba(24, 144, 255, .88), rgba(54, 207, 201, .72)),
        url("https://images.unsplash.com/photo-1517048676732-d65bc937f952?auto=format&fit=crop&w=1600&q=80") center/cover;
    }
    .login-panel {
      background: rgba(255,255,255,.98);
      padding: 46px 40px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      border-right: 1px solid rgba(255,255,255,.36);
    }
    .login-brand { display: flex; align-items: center; gap: 12px; margin-bottom: 32px; }
    .brand-mark {
      width: 42px; height: 42px; border-radius: 8px;
      background: var(--blue); color: #fff; display: grid; place-items: center;
    }
    .login-brand h1 { margin: 0; font-size: 24px; line-height: 1.25; }
    .login-brand p { margin: 5px 0 0; color: var(--muted); font-size: 13px; }
    .login-form { display: grid; gap: 14px; }
    .login-side {
      color: #fff;
      padding: 64px;
      display: flex;
      flex-direction: column;
      justify-content: flex-end;
      min-height: 520px;
    }
    .login-side h2 { margin: 0 0 14px; font-size: 40px; line-height: 1.16; }
    .login-side p { margin: 0; max-width: 650px; color: rgba(255,255,255,.88); line-height: 1.8; }
    .divider {
      display: grid; grid-template-columns: 1fr auto 1fr; align-items: center; gap: 10px;
      color: var(--muted); font-size: 12px; margin: 4px 0;
    }
    .divider::before, .divider::after { content: ""; height: 1px; background: var(--line); }

    .app-shell { min-height: 100vh; display: grid; grid-template-columns: 238px minmax(0, 1fr); }
    .sidebar {
      position: sticky; top: 0; height: 100vh;
      background: var(--nav);
      color: #fff;
      display: flex;
      flex-direction: column;
    }
    .logo {
      height: 72px;
      padding: 0 18px;
      display: flex;
      align-items: center;
      gap: 10px;
      border-bottom: 1px solid rgba(255,255,255,.1);
      font-weight: 700;
      font-size: 18px;
    }
    .logo .brand-mark { width: 36px; height: 36px; }
    .nav { padding: 0; display: grid; gap: 0; }
    .nav button {
      height: 56px; width: 100%;
      border: 0; border-radius: 0;
      background: transparent; color: #cbd5e1;
      display: flex; align-items: center; gap: 10px;
      padding: 0 18px; text-align: left;
      font-size: 16px;
    }
    .nav button:hover { background: var(--nav-soft); color: #fff; }
    .nav button.active { background: var(--blue); color: #fff; box-shadow: none; }
    .sidebar-footer {
      margin-top: auto; padding: 16px;
      border-top: 1px solid rgba(255,255,255,.1);
      color: #94a3b8; font-size: 12px; line-height: 1.7;
    }
    .main { min-width: 0; padding: 18px 22px 32px; }
    .topbar {
      min-height: 58px;
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      box-shadow: 0 2px 10px rgba(15, 23, 42, .04);
      padding: 0 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      margin-bottom: 16px;
    }
    .breadcrumb { color: var(--muted); font-size: 13px; }
    .page-title { font-weight: 700; color: var(--text); }
    .top-actions { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; justify-content: flex-end; }
    .avatar {
      width: 32px; height: 32px; border-radius: 50%;
      background: #e6f7ff; color: #0958d9;
      display: grid; place-items: center;
      font-weight: 700; font-size: 13px;
    }

    .btn {
      min-height: 36px;
      border: 1px solid var(--line-strong);
      border-radius: var(--radius);
      background: #fff;
      color: var(--text);
      padding: 0 12px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 7px;
      white-space: nowrap;
      text-decoration: none;
    }
    .btn:hover { border-color: var(--blue); color: var(--blue); }
    .btn.primary { background: var(--blue); border-color: var(--blue); color: #fff; box-shadow: 0 2px 8px rgba(24,144,255,.28); }
    .btn.primary:hover { background: var(--blue-dark); border-color: var(--blue-dark); color: #fff; box-shadow: 0 4px 12px rgba(24,144,255,.34); }
    .btn.green { background: var(--green); border-color: var(--green); color: #fff; }
    .btn.red { background: var(--red); border-color: var(--red); color: #fff; }
    .btn.small { min-height: 30px; padding: 0 9px; font-size: 12px; }
    .btn:disabled { opacity: .58; cursor: not-allowed; }
    input, select, textarea {
      width: 100%;
      border: 1px solid var(--line-strong);
      border-radius: var(--radius);
      background: #fff;
      color: var(--text);
      min-height: 38px;
      padding: 9px 11px;
      outline: none;
    }
    input:focus, select:focus, textarea:focus {
      border-color: var(--blue);
      box-shadow: 0 0 0 3px rgba(24, 144, 255, .12);
    }
    label { color: #344054; font-size: 13px; font-weight: 600; }
    .field { display: grid; gap: 7px; }
    .form-grid { display: grid; grid-template-columns: repeat(3, minmax(0, 1fr)); gap: 14px; }
    .form-grid .span-2 { grid-column: span 2; }
    .form-grid .span-3 { grid-column: 1 / -1; }
    .radio-row, .check-row { display: flex; gap: 12px; flex-wrap: wrap; }
    .radio-chip {
      min-height: 38px;
      display: inline-flex;
      align-items: center;
      gap: 7px;
      border: 1px solid var(--line-strong);
      border-radius: var(--radius);
      padding: 0 10px;
      background: #fff;
      font-weight: 500;
    }
    .radio-chip input { width: auto; min-height: 0; }
    .select-grid { display: grid; grid-template-columns: 220px minmax(0, 1fr); gap: 14px; align-items: start; }
    .factory-list { display: grid; gap: 8px; }
    .factory-button {
      border: 1px solid var(--line-strong);
      border-radius: var(--radius);
      background: #fff;
      min-height: 42px;
      padding: 0 12px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      color: var(--text);
      text-align: left;
    }
    .factory-button:hover, .factory-button.active { border-color: #91d5ff; background: #e6f7ff; color: #0958d9; }
    .plant-picker { display: grid; grid-template-columns: repeat(auto-fit, minmax(190px, 1fr)); gap: 10px; }
    .checkbox-card {
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: #fff;
      padding: 11px 12px;
      display: grid;
      grid-template-columns: auto minmax(0, 1fr);
      gap: 9px;
      align-items: start;
      min-height: 70px;
    }
    .checkbox-card input { width: auto; min-height: 0; margin-top: 3px; }
    .checkbox-card strong { display: block; color: #102a43; }
    .checkbox-card span { display: block; color: var(--muted); font-size: 12px; line-height: 1.45; margin-top: 3px; }
    .area-chips { display: flex; gap: 8px; flex-wrap: wrap; }
    .area-chip {
      min-height: 28px;
      display: inline-flex;
      align-items: center;
      border-radius: 4px;
      border: 1px solid #91d5ff;
      background: #e6f7ff;
      color: #0958d9;
      padding: 0 9px;
      font-size: 12px;
      font-weight: 600;
    }
    .run-summary {
      border: 1px solid #91d5ff;
      background: #f0f8ff;
      border-radius: var(--radius);
      padding: 12px;
      display: grid;
      gap: 9px;
      font-size: 13px;
    }
    .summary-row { display: grid; grid-template-columns: 96px minmax(0, 1fr); gap: 10px; align-items: start; }
    .summary-row span:first-child { color: var(--muted); }
    .summary-row strong { color: #102a43; }

    .panel {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      box-shadow: 0 2px 10px rgba(15, 23, 42, .04);
      overflow: hidden;
    }
    .panel + .panel { margin-top: 16px; }
    .panel-header {
      min-height: 52px;
      padding: 0 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      border-bottom: 1px solid var(--line);
      background: #fafcff;
    }
    .panel-title { display: flex; align-items: center; gap: 9px; font-weight: 700; }
    .panel-sub { color: var(--muted); font-size: 12px; margin-top: 2px; line-height: 1.5; }
    .panel-body { padding: 16px; }
    .grid { display: grid; gap: 16px; }
    .grid.cols-2 { grid-template-columns: minmax(0, 1fr) minmax(0, 1fr); }
    .grid.cols-3 { grid-template-columns: repeat(3, minmax(0, 1fr)); }
    .grid.cols-4 { grid-template-columns: repeat(4, minmax(0, 1fr)); }
    .metric {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      padding: 15px;
      display: grid;
      gap: 7px;
    }
    .metric .label { color: var(--muted); font-size: 12px; }
    .metric .value { font-size: 23px; font-weight: 800; }
    .metric .hint { color: var(--muted); font-size: 12px; line-height: 1.45; }
    .agent-v2-entry {
      border: 1px solid #d9e5f2;
      border-radius: var(--radius);
      background: #f8fbff;
      padding: 10px 12px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }
    .agent-v2-main { display: flex; align-items: flex-start; gap: 10px; min-width: 0; }
    .agent-v2-icon {
      width: 32px;
      height: 32px;
      border-radius: 8px;
      background: #e6f7ff;
      color: var(--blue);
      display: grid;
      place-items: center;
      flex: 0 0 auto;
    }
    .agent-v2-copy { display: grid; gap: 2px; min-width: 0; }
    .agent-v2-title { color: #102a43; font-size: 14px; font-weight: 700; }
    .agent-v2-desc { color: var(--muted); font-size: 12px; line-height: 1.45; }
    .quick-actions { display: grid; grid-template-columns: repeat(4, minmax(170px, 1fr)); gap: 12px; }
    .action-card {
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: #fff;
      padding: 12px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      min-height: 86px;
      transition: border-color .16s, box-shadow .16s, transform .16s;
    }
    .action-card:hover { border-color: #91d5ff; box-shadow: 0 4px 14px rgba(15, 23, 42, .07); transform: translateY(-1px); }
    .action-top { display: flex; align-items: center; gap: 10px; min-width: 0; }
    .action-icon {
      width: 34px;
      height: 34px;
      border-radius: 8px;
      background: #f5f8fc;
      color: var(--blue);
      display: grid;
      place-items: center;
      border: 1px solid #e3edf8;
      flex: 0 0 auto;
    }
    .action-icon .icon { width: 18px; height: 18px; }
    .action-copy { display: grid; gap: 3px; min-width: 0; }
    .action-name { font-weight: 800; font-size: 15px; color: #102a43; line-height: 1.25; }
    .action-desc { color: var(--muted); font-size: 12px; line-height: 1.35; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .action-card .btn { flex: 0 0 auto; }
    .execute-shell { display: grid; gap: 16px; }
    .execute-form-grid { display: grid; grid-template-columns: minmax(220px, 360px); gap: 16px; max-width: 360px; }
    .execute-range {
      border: 1px solid #91d5ff;
      background: #eef8ff;
      border-radius: var(--radius);
      padding: 14px 16px;
      display: grid;
      gap: 10px;
    }
    .execute-range-row {
      display: grid;
      grid-template-columns: 88px minmax(0, 1fr);
      gap: 16px;
      align-items: start;
    }
    .execute-range-label { color: #475467; line-height: 28px; }
    .execute-range-value { color: #102a43; font-weight: 800; line-height: 28px; }
    .execute-actions { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
    .transaction-groups { display: grid; gap: 22px; }
    .transaction-group { display: grid; gap: 12px; }
    .transaction-group-head {
      color: #102a43;
      font-size: 18px;
      font-weight: 800;
      line-height: 1.3;
      padding: 0 2px;
    }
    .transaction-grid {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 14px;
      overflow: visible;
    }
    .transaction-card {
      border: 1px solid var(--line);
      border-radius: 4px;
      background: #fff;
      padding: 18px 16px;
      display: grid;
      grid-template-rows: auto auto 1fr auto;
      justify-items: center;
      text-align: center;
      gap: 10px;
      min-height: 172px;
      transition: border-color .18s, box-shadow .18s, transform .18s;
    }
    .transaction-card:hover {
      border-color: #b7d9ff;
      box-shadow: 0 12px 28px rgba(15, 23, 42, .12);
      transform: translateY(-4px);
    }
    .transaction-card-head { display: contents; }
    .transaction-card .action-icon {
      width: 38px;
      height: 38px;
      border-radius: 8px;
      margin-bottom: 2px;
    }
    .transaction-card .action-icon .icon { width: 20px; height: 20px; }
    .transaction-meta { display: contents; }
    .transaction-code { font-size: 17px; font-weight: 800; color: #102a43; line-height: 1.25; }
    .transaction-name {
      color: var(--muted);
      font-size: 13px;
      line-height: 1.45;
      min-height: 38px;
      max-width: 100%;
      overflow: hidden;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
    }
    .transaction-tags { display: flex; align-items: center; justify-content: center; gap: 6px; flex-wrap: wrap; min-height: 28px; }
    .transaction-card .btn { justify-self: center; margin-top: 4px; }
    .report-toolbar { display: flex; align-items: end; gap: 10px; flex-wrap: wrap; margin-bottom: 16px; }
    .report-toolbar .field { min-width: 170px; }
    .report-metrics { display: grid; grid-template-columns: repeat(4, minmax(0, 1fr)); gap: 12px; margin-bottom: 18px; }
    .report-metric {
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: #fff;
      padding: 16px;
      display: grid;
      gap: 6px;
      min-height: 92px;
    }
    .report-metric-value { font-size: 26px; font-weight: 800; color: #1677ff; }
    .report-metric-label { color: var(--muted); font-size: 13px; }
    .param-preview { display: grid; gap: 10px; }
    .param-grid { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 10px; }
    .param-item {
      border: 1px solid var(--line);
      border-radius: var(--radius);
      padding: 10px 12px;
      background: #fff;
      min-height: 58px;
      display: grid;
      gap: 4px;
    }
    .param-label { color: var(--muted); font-size: 12px; }
    .param-value { color: #102a43; font-weight: 700; overflow-wrap: anywhere; }
    .workflow-map {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 12px;
    }
    .workflow-stage {
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: #f8fbff;
      padding: 12px;
      display: grid;
      align-content: start;
      gap: 10px;
      min-height: 260px;
    }
    .stage-head { display: flex; align-items: center; gap: 8px; font-weight: 800; color: #102a43; }
    .stage-num {
      width: 24px; height: 24px; border-radius: 50%;
      background: #e6f7ff; color: var(--blue);
      display: grid; place-items: center;
      font-size: 12px;
      flex: 0 0 auto;
    }
    .logic-list { display: grid; gap: 8px; }
    .logic-node {
      border: 1px solid #d9e5f2;
      border-radius: var(--radius);
      background: #fff;
      padding: 10px;
      display: grid;
      gap: 4px;
    }
    .logic-node strong { color: #102a43; font-size: 14px; }
    .logic-node span { color: var(--muted); font-size: 12px; line-height: 1.5; }
    .logic-node.primary { border-color: #91d5ff; background: #f0f8ff; }
    .logic-node.check { border-color: #b7eb8f; background: #f6ffed; }
    .logic-note { color: var(--muted); font-size: 12px; line-height: 1.55; }
    .executor-stack { display: grid; gap: 10px; }
    .executor-row {
      min-height: 40px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: #fff;
      padding: 8px 10px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      font-size: 13px;
    }
    .launch-link {
      border: 1px solid #91d5ff;
      background: #e6f7ff;
      border-radius: var(--radius);
      padding: 10px 12px;
      color: #0958d9;
      font-family: Consolas, "Microsoft YaHei UI", monospace;
      font-size: 12px;
      overflow-wrap: anywhere;
      line-height: 1.55;
    }
    .badge, .tag {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      min-height: 22px;
      border-radius: 999px;
      padding: 0 8px;
      font-size: 12px;
      border: 1px solid transparent;
      white-space: nowrap;
    }
    .badge.viewer { background: #e6f7ff; color: #0958d9; border-color: #91d5ff; }
    .badge.executor { background: #f6ffed; color: #389e0d; border-color: #b7eb8f; }
    .tag.ok { background: #f6ffed; color: #389e0d; border-color: #b7eb8f; }
    .tag.info { background: #e6f7ff; color: #0958d9; border-color: #91d5ff; }
    .tag.warn { background: #fffbe6; color: #ad6800; border-color: #ffe58f; }
    .tag.err { background: #fff1f0; color: #cf1322; border-color: #ffa39e; }
    .notice {
      border: 1px solid #91d5ff;
      background: #e6f7ff;
      color: #0958d9;
      border-radius: var(--radius);
      padding: 12px 14px;
      line-height: 1.65;
      font-size: 13px;
    }
    .notice.warn { border-color: #ffe58f; background: #fffbe6; color: #ad6800; }
    .notice.ok { border-color: #b7eb8f; background: #f6ffed; color: #237804; }
    .table-wrap { overflow-x: auto; }
    table { width: 100%; border-collapse: collapse; min-width: 760px; }
    th, td { padding: 11px 12px; border-bottom: 1px solid var(--line); text-align: left; font-size: 13px; vertical-align: middle; }
    th { background: #f5f7fa; color: #475467; font-weight: 700; }
    tbody tr:hover { background: #f5f8ff; }
    .tabs { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 14px; }
    .tab {
      border: 1px solid var(--line-strong);
      background: #fff;
      border-radius: var(--radius);
      min-height: 34px;
      padding: 0 11px;
      display: inline-flex;
      align-items: center;
      gap: 6px;
    }
    .tab.active { color: var(--blue); border-color: #91d5ff; background: #e6f7ff; }
    .config-status {
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: #fff;
      padding: 12px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 14px;
    }
    .config-status-main { display: grid; gap: 4px; min-width: 0; }
    .config-status-title { display: flex; align-items: center; gap: 8px; font-weight: 700; color: #102a43; }
    .config-status-sub { color: var(--muted); font-size: 12px; line-height: 1.45; }
    .config-section { display: grid; gap: 10px; }
    .config-section + .config-section { margin-top: 16px; }
    .config-section-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      min-height: 36px;
    }
    .config-section-title { display: flex; align-items: center; gap: 8px; font-weight: 800; color: #102a43; }
    .inline-actions { display: inline-flex; align-items: center; gap: 6px; flex-wrap: wrap; }
    .empty-cell { color: var(--muted); text-align: center; padding: 18px 12px; }
    .secret-state { color: #102a43; font-weight: 700; }
    .table-hint { color: var(--muted); font-size: 12px; line-height: 1.5; }
    .steps { display: grid; gap: 10px; }
    .queue-strip {
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: #f8fbff;
      padding: 10px 12px;
      display: grid;

      { id: "SCH-001", name: "周一 ZFI019NL 周损益链路", tCode: "ZFI019NL", factoryGroup: "PINGHU_ALL", plants: ["1022", "1024", "1032", "6041", "103C", "1031", "1033", "103D", "1035", "1036"], time: "08:00", frequency: "每周一", status: "启用", next: "2026/06/15 08:00" }

    let history = [
      { id: "RUN-20260608-001", time: "2026/06/08 08:00", task: "周一 ZFI019NL 周损益链路", tCode: "ZFI019NL", plant: "1022,1024,1032,6041", duration: "45 秒", status: "成功", notify: "已推送", result: "保存并导出周损益结果 18 行" },
      { id: "RUN-20260607-002", time: "2026/06/07 08:00", task: "ZFI057 产值拆分", tCode: "ZFI057", plant: "1032", duration: "1 分 23 秒", status: "失败", notify: "告警已推送", result: "SAP 连接超时" }
    ];
    const pages = {
      dashboard: "工作台",
      execute: "执行任务",
      schedule: "定时任务",
      config: "基础配置",
      schedule: "定时任务"
    };
    const fallbackConfig = JSON.parse(JSON.stringify({
      tCodes,
      plants,
      factoryGroups,
      robots
    }));

    const icon = (name, cls = "icon") => `<i class="${cls}" data-lucide="${name}"></i>`;
    const esc = value => String(value ?? "").replace(/[&<>"']/g, c => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[c]));
    const app = document.getElementById("app");

    function clonePlain(value) {
      return JSON.parse(JSON.stringify(value));
    }

    function toArray(value) {
      if (Array.isArray(value)) return value.map(item => String(item).trim()).filter(Boolean);
      if (typeof value === "string") return value.split(/[,\n，、;]/).map(item => item.trim()).filter(Boolean);
      return [];
    }

    function boolValue(value, fallback = true) {
      if (typeof value === "boolean") return value;
      if (typeof value === "number") return value !== 0;
      if (typeof value === "string") return !["false", "0", "停用", "disabled"].includes(value.toLowerCase());
      return fallback;
    }

    function restoreFallbackConfig({ includeTransactions = true } = {}) {
      if (includeTransactions) tCodes = clonePlain(fallbackConfig.tCodes);
      plants = clonePlain(fallbackConfig.plants);
      factoryGroups = clonePlain(fallbackConfig.factoryGroups);
      robots = clonePlain(fallbackConfig.robots);
      Object.keys(plantCatalog).forEach(code => delete plantCatalog[code]);
      plants.forEach(plant => { plantCatalog[plant.code] = plant; });
    }

    function normalizeTransactionFromApi(item) {
      const code = String(item.code || item.tcode || item.tCode || item.transactionCode || "").trim().toUpperCase();
      return {
        code,
        name: item.name || item.transactionName || code,
        module: item.module || "",
        stage: item.stage || "未分组",
        script: item.script || item.scriptFile || (code + ".vbs"),
        icon: item.icon || "terminal",
        params: item.paramsList || item.params || [],
        factoryRule: item.factoryRule || "",
        fixedPlants: item.fixedPlants || [],
        plants: toArray(item.plants || item.defaultPlants || item.allowedPlants),
        defaultPlantGroup: item.defaultPlantGroup || "PINGHU_30",
        automation: item.automation || "openOnly",
        selectableGroupIds: toArray(item.selectableGroupIds || item.selectableGroups),
        businessAreaMode: item.businessAreaMode || "byPlant",
        businessAreas: toArray(item.businessAreas),
        scriptVersion: item.scriptVersion || "",
        scriptHash: item.scriptHash || "",
        timeout: Number(item.timeoutSeconds || item.timeout || 180),
        retry: Number(item.retryCount || item.retry || item.maxAttempts || 2),
        enabled: boolValue(item.enabled ?? item.isActive, true)
      };
    }

    function normalizePlantFromApi(item) {
      const code = String(item.code || item.plantCode || item.id || "").trim().toUpperCase();
      return {
        code,
        name: item.name || item.plantName || code,
        area: item.area || item.businessArea || "",
        groups: toArray(item.groups || item.groupIds || item.plantGroups),
        sortOrder: Number(item.sortOrder || item.sort_order || item.order || item.displayOrder || 0),
        enabled: boolValue(item.enabled ?? item.isActive, true)
      };
    }

    function normalizePlantGroupFromApi(item) {
      const id = String(item.id || item.code || item.groupId || "").trim();
      const plantsInGroup = toArray(item.plants || item.plantCodes || item.members);
      const rawName = item.name || item.groupName || id;
      const displayName = legacyBusinessRangeNames[rawName] || businessRangeLabels[id] || rawName || id;
      return {
        id,
        name: displayName,
        shortName: legacyBusinessRangeNames[item.shortName] || businessRangeLabels[id] || item.shortName || displayName,
        plants: plantsInGroup,
        zfi019nlAreas: toArray(item.zfi019nlAreas || item.zfi019nlBusinessAreas || item.businessAreas),
        zfi080Areas: toArray(item.zfi080Areas || item.zfi080BusinessAreas || item.businessAreas),
        zfi072Plants: toArray(item.zfi072Plants || item.zfi072PlantCodes || plantsInGroup),
        zco019Plants: toArray(item.zco019Plants || item.zco019PlantCodes || plantsInGroup),
        enabled: boolValue(item.enabled ?? item.isActive, true)
      };
    }

    function normalizeTransactionRuleFromApi(item) {
      const code = String(item.code || item.tcode || item.tCode || item.transactionCode || "").trim().toUpperCase();
      const base = getTCode(code) || {};
      return {
        ...base,
        code,
        name: item.name || base.name || code,
        module: item.module || base.module || "",
        stage: item.stage || base.stage || "未分组",
        script: item.script || item.scriptFile || base.script || (code + ".vbs"),
        icon: item.icon || base.icon || "terminal",
        params: toArray(item.paramsList || item.params || base.params),
        factoryRule: item.factoryRule || item.ruleName || base.factoryRule || "",
        fixedPlants: toArray(item.fixedPlants || item.fixedPlantCodes || item.plants || item.defaultPlants || item.allowedPlants || item.plantCodes),
        plants: toArray(item.plants || item.defaultPlants || item.allowedPlants || item.plantCodes || item.fixedPlants || item.fixedPlantCodes),
        selectableGroupIds: toArray(item.selectableGroupIds || item.selectableGroups || base.selectableGroupIds),
        businessAreaMode: item.businessAreaMode || base.businessAreaMode || "byPlant",
        businessAreas: toArray(item.businessAreas || item.businessAreaCodes || base.businessAreas),
        defaultPlantGroup: item.defaultPlantGroup || item.plantGroupId || item.groupId || base.defaultPlantGroup || "PINGHU_30",
        automation: item.automation || base.automation || "openOnly",
        timeout: Number(item.timeoutSeconds || item.timeout || base.timeout || 180),
        retry: Number(item.retryCount || item.retry || item.maxAttempts || base.retry || 2),
        enabled: boolValue(item.enabled ?? item.isActive, true),
        configSource: "api-config"
      };
    }

    function normalizeRobotFromApi(item) {
      const id = String(item.id || item.robotId || item.code || "").trim();
      const bindings = Array.isArray(item.bindings) ? item.bindings : [];
      return {
        id,
        name: item.name || item.robotName || id,
        robotType: item.robotType || item.type || "dingtalk",
        group: item.group || item.groupName || item.targetName || item.targetLabel || "",
        events: toArray(item.events || item.eventTypes || item.subscriptions || bindings.map(binding => binding.eventName || binding.event || binding.tcode || binding.code)),
        bindings,
        enabled: boolValue(item.enabled ?? item.isActive, true),
        lastPush: item.lastPush || item.lastSentAt || "",
        hasWebhook: !!(item.hasWebhook || item.webhookConfigured || item.webhookMasked),
        hasSecret: !!(item.hasSecret || item.secretConfigured || item.secretMasked)
      };
    }

    function applyConfigData(data) {
      const hasPlants = Array.isArray(data.plants);
      const hasGroups = Array.isArray(data.plantGroups);
      const hasRules = Array.isArray(data.transactionRules);
      const hasRobots = Array.isArray(data.notificationRobots);
      const nextPlants = hasPlants ? data.plants.map(normalizePlantFromApi).filter(item => item.code) : [];
      const nextGroups = hasGroups ? data.plantGroups.map(normalizePlantGroupFromApi).filter(item => item.id) : [];
      const nextRules = hasRules ? data.transactionRules.map(normalizeTransactionRuleFromApi).filter(item => item.code) : [];
      const nextRobots = hasRobots ? data.notificationRobots.map(normalizeRobotFromApi).filter(item => item.id) : [];

      if (hasPlants) {
        plants = nextPlants;
        Object.keys(plantCatalog).forEach(code => delete plantCatalog[code]);
        plants.forEach(plant => { plantCatalog[plant.code] = plant; });
      }
      if (hasGroups) factoryGroups = nextGroups;
      if (hasRules) {
        const byCode = new Map(tCodes.map(item => [item.code, item]));
        nextRules.forEach(rule => byCode.set(rule.code, rule));
        tCodes = nextRules.length ? Array.from(byCode.values()) : tCodes;
      }
      if (hasRobots) robots = nextRobots;

      state.config = {
        online: true,
        source: "api",
        lastLoaded: new Date().toLocaleTimeString("zh-CN", { hour12: false }),
        error: ""
      };
      syncExecutionDefaults(false);
    }

    async function refreshConfigData({ silent = true } = {}) {
      try {
        const data = await bridgeFetch(CONFIG_API_PATHS.root);
        applyConfigData(data || {});
        if (!silent) toast("基础配置已从 API 刷新", "ok");
      } catch (err) {
        state.config = {
          online: false,
          source: "fallback",
          lastLoaded: new Date().toLocaleTimeString("zh-CN", { hour12: false }),
          error: err.message || "基础配置 API 不可用"
        };
        restoreFallbackConfig({ includeTransactions: false });
        if (!silent) toast("基础配置 API 未接通，当前显示只读静态默认值", "warn");
      }
    }

    function normalizeRunFromApi(run) {
      const params = readRunParams(run.requestJson);
      const statusText = run.status === "success" ? "成功" : run.status === "failed" ? "失败" : run.status === "running" ? "执行中" : run.status === "canceled" ? "已取消" : "排队中";
      return {
        id: run.runId,
        time: run.finishedAt || run.startedAt || run.queuedAt || "",
        task: (getTCode(run.transactionCode)?.name || run.transactionCode) + " / " + (run.operatorName || "本机用户"),
        tCode: run.transactionCode,
        plant: params.plants || params.plant || "",
        duration: formatDuration(run.durationMs || 0),
        status: statusText,
        notify: "本地记录",
        result: run.message || run.sapStatusText || run.status,
        logs: run.logs || [],
        files: run.files || []
      };
    }

    function readRunParams(requestJson) {
      try {
        const data = JSON.parse(requestJson || "{}");
        return data.params || {};
      } catch {
        return {};
      }
    }

    function formatDuration(ms) {
      if (!ms) return "-";
      if (ms < 1000) return ms + " 毫秒";
      if (ms < 60000) return Math.round(ms / 1000) + " 秒";
      return Math.floor(ms / 60000) + " 分 " + Math.round((ms % 60000) / 1000) + " 秒";
    }

    function toQueueNumber(value) {
      if (value === undefined || value === null || value === "") return null;
      const num = Number(value);
      return Number.isFinite(num) ? num : null;
    }

    function pickQueueField(source, ...keys) {
      for (const key of keys) {
        if (source && source[key] !== undefined && source[key] !== null && source[key] !== "") return source[key];
      }
      return null;
    }

    function normalizeRunStatus(status) {
      const value = String(status || "").toLowerCase();
      if (value === "succeeded" || value === "completed") return "success";
      if (value === "error") return "failed";
      if (value === "cancelled") return "canceled";
      if (value === "pending" || value === "created") return "queued";
      if (value === "in_progress" || value === "processing" || value === "executing") return "running";
      return value || "queued";
    }

    function mergeQueueInfo(data = {}, runId = "") {
      const source = data.queue || data.queueStatus || data;
      const queuedRuns = source.queuedRuns || source.queued || source.items || data.queuedRuns || data.queued || data.items;
      let queuePosition = toQueueNumber(pickQueueField(source, "queuePosition", "position") ?? pickQueueField(data, "queuePosition", "position"));
      let runsAhead = toQueueNumber(pickQueueField(source, "runsAhead", "ahead") ?? pickQueueField(data, "runsAhead", "ahead"));
      let workItemsAhead = toQueueNumber(pickQueueField(source, "workItemsAhead") ?? pickQueueField(data, "workItemsAhead"));
      let queuedCount = toQueueNumber(pickQueueField(source, "queuedCount", "queueCount", "pendingCount", "waitingCount") ?? pickQueueField(data, "queuedCount", "queueCount", "pendingCount", "waitingCount"));
      const runningRunId = String(
        pickQueueField(source, "runningRunId", "currentRunId") ??
        pickQueueField(data, "runningRunId", "currentRunId") ??
        source.running?.runId ??
        source.running?.id ??
        data.running?.runId ??
        data.running?.id ??
        ""
      );
      if (runsAhead === null && queuePosition !== null) runsAhead = Math.max(queuePosition - 1, 0);
      if (workItemsAhead === null) {
        const hasOtherRunning = !!runningRunId && (!runId || runningRunId !== runId);
        workItemsAhead = runsAhead !== null ? runsAhead + (hasOtherRunning ? 1 : 0) : null;
      }
      if (queuedCount === null && Array.isArray(queuedRuns)) queuedCount = queuedRuns.length;

      const hasRunningField = (source && ("runningRunId" in source || "currentRunId" in source || "running" in source)) ||
        (data && ("runningRunId" in data || "currentRunId" in data || "running" in data));

      state.queue = {
        online: true,
        runningRunId: hasRunningField ? runningRunId : (runningRunId || state.queue.runningRunId || ""),
        queuedCount: queuedCount !== null ? queuedCount : state.queue.queuedCount,
        queuePosition: queuePosition !== null ? queuePosition : state.queue.queuePosition,
        runsAhead: runsAhead !== null ? runsAhead : state.queue.runsAhead,
        workItemsAhead: workItemsAhead !== null ? workItemsAhead : state.queue.workItemsAhead,
        lastChecked: nowTime()
      };

      if (state.currentRun && runId && state.currentRun.id === runId) {
        state.currentRun.queuePosition = queuePosition !== null ? queuePosition : state.currentRun.queuePosition;
        state.currentRun.runsAhead = runsAhead !== null ? runsAhead : state.currentRun.runsAhead;
        state.currentRun.workItemsAhead = workItemsAhead !== null ? workItemsAhead : state.currentRun.workItemsAhead;
        state.currentRun.queuedCount = queuedCount !== null ? queuedCount : state.currentRun.queuedCount;
        state.currentRun.runningRunId = state.queue.runningRunId;
        state.currentRun.status = normalizeRunStatus(data.status || state.currentRun.status);
      }
    }

    function queueAheadText(run = state.currentRun) {
      const status = normalizeRunStatus(run?.status);
      if (status === "running") return "正在执行";
      if (status === "success") return "已完成";
      if (status === "failed") return "执行失败";
      if (status === "canceled") return "已取消";
      const workItemsAhead = toQueueNumber(run?.workItemsAhead ?? state.queue.workItemsAhead);
      if (workItemsAhead !== null) return "前方 " + workItemsAhead + " 个任务";
      const runsAhead = toQueueNumber(run?.runsAhead ?? state.queue.runsAhead);
      if (runsAhead !== null) return "前方 " + runsAhead + " 个任务";
      const queuePosition = toQueueNumber(run?.queuePosition ?? state.queue.queuePosition);
      if (queuePosition !== null) return "排队位置 " + queuePosition;
      return "等待执行器领取";
    }

    function addRunStatusLog(type, key, message) {
      if (state.currentRun && state.currentRun.lastStatusLogKey === key) return;
      if (state.currentRun) state.currentRun.lastStatusLogKey = key;
      addLog(type, message);
    }

    function mergeRunLogs(run) {
      const lines = Array.isArray(run?.logs) ? run.logs : [];
      if (!state.currentRun) return;
      state.currentRun.seenBackendLogs ||= new Set();
      lines.forEach(line => {
        const message = line.message || "";
        if (!message) return;
        const key = (line.createdAt || "") + "|" + (line.level || "") + "|" + message;
        if (state.currentRun.seenBackendLogs.has(key)) return;
        state.currentRun.seenBackendLogs.add(key);
        const level = String(line.level || "INFO").toUpperCase();
        addLog(level === "ERROR" || level === "ERR" ? "ERR" : level === "WARN" ? "WARN" : "INFO", message);
      });
    }

    async function refreshQueueStatus({ silent = true, runId = "" } = {}) {
      if (!state.bridge.online || state.bridge.queueMode === "disabled") return null;
      try {
        const data = await bridgeFetch("/api/queue/status");
        mergeQueueInfo(data, runId);
        return data;
      } catch (err) {
        state.queue.online = false;
        if (!silent) toast("队列状态接口暂不可用", "warn");
        return null;
      }
    }

    function bridgeStatusText() {
      if (!state.bridge.online) return "sap-rpa://";
      return state.bridge.queueMode === "disabled" ? "API 已连接 / 队列禁用" : "API 已连接 / 串行队列";
    }

    function bridgeStatusSubtext() {
      if (!state.bridge.online) return "点击执行时由浏览器唤醒 SapWebLauncher";
      if (state.bridge.queueMode === "disabled") return "当前只创建 SQLite 任务，不会启动 SAP";
      return "本机 API 会提交任务，SAP GUI 由后台串行执行";
    }

    function render() {
      app.innerHTML = state.loggedIn ? renderShell() : renderLogin();
      bindEvents();
      lucide.createIcons();
    }

    async function refreshBridgeData({ silent = true } = {}) {
      try {
        const health = await bridgeFetch("/api/health");
        state.bridge = {
          online: !!health.ok,
          lastChecked: new Date().toLocaleTimeString("zh-CN", { hour12: false }),
          database: health.database || "",
          queueMode: health.queueMode || ""
        };

        const txData = await bridgeFetch("/api/transactions");
        if (Array.isArray(txData.transactions) && txData.transactions.length) {
          tCodes = txData.transactions.map(normalizeTransactionFromApi);
        }

        await refreshConfigData({ silent: true });
        await refreshQueueStatus({ silent: true });

        const runData = await bridgeFetch("/api/runs?limit=20");
        if (Array.isArray(runData.runs)) {
          history = runData.runs.map(normalizeRunFromApi);
        }

        if (!silent) toast("已连接本机执行器并刷新数据", "ok");
        render();
      } catch (err) {
        state.bridge.online = false;
        state.bridge.queueMode = "";
        state.bridge.lastChecked = new Date().toLocaleTimeString("zh-CN", { hour12: false });
        state.queue = { online: false, runningRunId: "", queuedCount: null, queuePosition: null, runsAhead: null, workItemsAhead: null, lastChecked: state.bridge.lastChecked };
        state.config = { online: false, source: "fallback", lastLoaded: state.bridge.lastChecked, error: err.message || "本机 API 不可用" };
        restoreFallbackConfig();
        if (!silent) toast("本机执行器未启动，继续使用协议唤醒模式", "warn");
        render();
      }
    }

    async function bridgeFetch(path, options = {}) {
      const response = await fetch(BRIDGE_API + path, {
        ...options,
        headers: { "Content-Type": "application/json", ...(options.headers || {}) }
      });
      const text = await response.text();
      const data = text ? JSON.parse(text) : {};
      if (!response.ok) throw new Error(data.error || response.statusText);
      return data;
    }

    function reportMetric(label, value) {
      return `<div class="report-metric"><div class="report-metric-value">${esc(value)}</div><div class="report-metric-label">${esc(label)}</div></div>`;
    }

    function buildReportStats(rows) {
      const list = rows || [];
      const total = list.length;
      const success = list.filter(row => row.status === "成功").length;
      const durations = list.map(row => parseDurationSeconds(row.duration)).filter(value => value > 0);
      const avgSeconds = durations.length ? Math.round(durations.reduce((sum, value) => sum + value, 0) / durations.length) : 0;
      const byTCode = new Map();
      const byPlant = new Map();
      list.forEach(row => {
        const t = byTCode.get(row.tCode) || { code: row.tCode || "-", total: 0, success: 0, failed: 0, seconds: [] };
        t.total += 1;
        if (row.status === "成功") t.success += 1;
        if (row.status === "失败") t.failed += 1;
        const seconds = parseDurationSeconds(row.duration);
        if (seconds) t.seconds.push(seconds);
        byTCode.set(t.code, t);
        toArray(row.plant).forEach(plant => {
          const p = byPlant.get(plant) || { plant, total: 0, success: 0, failed: 0, latest: "" };
          p.total += 1;
          if (row.status === "成功") p.success += 1;
          if (row.status === "失败") p.failed += 1;
          p.latest = row.time || p.latest;
          byPlant.set(plant, p);
        });
      });
      return {
        total,
        successRate: total ? Math.round(success * 1000 / total) / 10 : 0,
        avgDuration: avgSeconds ? avgSeconds + "s" : "-",
        savedHours: Math.round(total * 0.15 * 10) / 10,
        tcodes: Array.from(byTCode.values()).sort((a, b) => b.total - a.total),
        plants: Array.from(byPlant.values()).sort((a, b) => b.total - a.total)
      };
    }

    function parseDurationSeconds(text) {
      const value = String(text || "");
      const min = Number((value.match(/(\d+)\s*分/) || [])[1] || 0);
      const sec = Number((value.match(/(\d+)\s*秒/) || [])[1] || 0);
      return min * 60 + sec;
    }

    function unique(list) {
      return [...new Set((list || []).filter(Boolean))];

    function getTCode(code) {
      return tCodes.find(x => x.code === code) || tCodes.find(x => x.code === "ZFI019NL") || tCodes[0];
    }

    function getFactoryGroup(id) {
      const group = factoryGroups.find(group => group.id === id);
      if (group) {
        const displayName = legacyBusinessRangeNames[group.name] || businessRangeLabels[group.id] || group.name;
        return { ...group, name: displayName, shortName: legacyBusinessRangeNames[group.shortName] || businessRangeLabels[group.id] || group.shortName || displayName };
      }
      return factoryGroups[0] ? {
        ...factoryGroups[0],
        name: legacyBusinessRangeNames[factoryGroups[0].name] || businessRangeLabels[factoryGroups[0].id] || factoryGroups[0].name,
        shortName: legacyBusinessRangeNames[factoryGroups[0].shortName] || businessRangeLabels[factoryGroups[0].id] || factoryGroups[0].shortName || factoryGroups[0].name
      } : {
        id: "",
        name: "未配置业务范围",
        shortName: "未配置",
        plants: [],
        zfi019nlAreas: [],
        zfi080Areas: [],
        zfi072Plants: [],
        zco019Plants: []
      };
    }

    function getBusinessAreaName(code) {
      return (businessAreaCatalog.find(item => item.code === code) || {}).name || "";
    }

    function getRulePlantList(t, group) {
      const explicitPlants = toArray(t?.plants);
      if (explicitPlants.length) return explicitPlants;
      const fixedPlants = toArray(t?.fixedPlants);
      if (state.config.online && t?.configSource === "api-config") {
        if (fixedPlants.length) return fixedPlants;
        if (t?.code === "ZFI072A" || t?.code === "ZFI072" || t?.code === "ZFI072N") return toArray(group?.zfi072Plants || group?.plants);
        if (t?.code === "ZCO019") return toArray(group?.zco019Plants || group?.plants);
        return toArray(group?.plants);
      }
      return fixedPlants;
    }

    function getDefaultPlantsForTCode(tCode, groupId = state.form.factoryGroup) {
      const t = getTCode(tCode);
      const group = getFactoryGroup(groupId);
      const rulePlants = getRulePlantList(t, group);
      if (rulePlants.length) return unique(rulePlants);
      if (tCode === "ZFI072A") return unique(toArray(group.zfi072Plants).length ? group.zfi072Plants : (state.config.online ? group.plants : zfi072PlantRule));
      if (tCode === "ZFI072" || tCode === "ZFI072N") return unique([...procurementPlants, ...group.zfi072Plants]);
      if (tCode === "ZCO019") return unique(group.zco019Plants);
      return unique(group.plants);
    }

    function getResolvedPlantsForRule(t, groupId = t?.defaultPlantGroup) {
      return getDefaultPlantsForTCode(t?.code || "", groupId);
    }

    function getRunPlantsForTCode(tCode, selectedPlants) {
      const t = getTCode(tCode);
      if (state.config.online && t?.configSource === "api-config") {
        const selected = unique(selectedPlants);
        return selected.length ? selected : getDefaultPlantsForTCode(tCode);
      }
      if (tCode === "ZFI072A") return [...zfi072PlantRule];
      return unique(selectedPlants);
    }

    function getBusinessAreasForSelection(tCode, selectedPlants = state.form.plants, groupId = state.form.factoryGroup) {
      const group = getFactoryGroup(groupId);
      if (!selectedPlants.length) return [];
      if (tCode === "ZFI019NL") return unique(toArray(group.zfi019nlAreas).length ? group.zfi019nlAreas : selectedPlants.map(code => plantCatalog[code]?.area));
      if (tCode === "ZFI080") return unique(toArray(group.zfi080Areas).length ? group.zfi080Areas : selectedPlants.map(code => plantCatalog[code]?.area));
      if (tCode === "ZCO019" || tCode === "ZFI057") {
        return unique(selectedPlants.map(code => plantCatalog[code]?.area));
      }
      return unique(selectedPlants.map(code => plantCatalog[code]?.area));
    }

      const t = getTCode(state.form.tCode);
      if (forcePlants && t.defaultPlantGroup) {

      if (!Array.isArray(state.form.plants)) state.form.plants = getDefaultPlantsForTCode(state.form.tCode);

    function renderCodeChips(values) {
      const items = toArray(values);
      if (!items.length) return `<span class="table-hint">-</span>`;
      return `<div class="area-chips">${items.map(item => `<span class="area-chip">${esc(item)}</span>`).join("")}</div>`;
    }

    function renderGroupNames(groupIds) {
      const names = toArray(groupIds).map(id => getFactoryGroup(id)?.shortName || getFactoryGroup(id)?.name || id);
      return names.length ? esc(names.join(",")) : `<span class="table-hint">-</span>`;
    }

    function renderSecretState(value) {
      return `<span class="secret-state">${value ? "已配置（已隐藏）" : "未配置"}</span>`;
    }

    function renderBusinessAreaModeText(value) {
      const map = {
        byPlant: "按工厂业务范围",
        fixed: "固定业务范围",
        byGroup: "按业务范围配置",
        none: "不传业务范围"
      };
      return map[value] || value || "-";
    }

    function getConfiguredPlantsForRule(rule) {
      if (toArray(rule.plants).length) return toArray(rule.plants);
      if (toArray(rule.fixedPlants).length) return toArray(rule.fixedPlants);
      const group = getFactoryGroup(rule.defaultPlantGroup);
      return group ? group.plants : [];
    }

    function renderModal() {
      if (state.modal === "register") {
        return `
          <div class="modal-backdrop">
            <div class="modal">
              <div class="modal-header"><strong>本机协议注册</strong><button class="btn small" data-action="close-modal">${icon("x")}关闭</button></div>
              <div class="modal-body">
                <div class="notice">当前正式注册 <strong>sap-rpa://</strong>。旧的临时测试协议不再安装；如电脑上曾导入过旧协议，可用上线安装包的卸载脚本清理。</div>
                <div style="height:12px"></div>
                <div class="launch-link">D:\\工作\\SapRpa上线安装包\\01_安装到本机.bat<br>D:\\工作\\SapRpa上线安装包\\04_配置SAP登录信息.bat</div>
              </div>
              <div class="modal-footer"><button class="btn primary" data-action="close-modal">关闭</button></div>
            </div>

      }
      if (state.modal === "schedule") {
        const schedulePlants = getDefaultPlantsForTCode(state.scheduleForm.tCode, state.scheduleForm.factoryGroup);
        return `
          <div class="modal-backdrop">
            <div class="modal">
              <div class="modal-header"><strong>新建定时任务</strong><button class="btn small" data-action="close-modal">${icon("x")}关闭</button></div>
              <div class="modal-body">
                <div class="form-grid">
                  <div class="field"><label>事务码</label><select id="scheduleTCode">${tCodes.map(t => `<option value="${t.code}" ${state.scheduleForm.tCode === t.code ? "selected" : ""}>${t.code} - ${t.name}</option>`).join("")}</select></div>
                  <div class="field span-2"><label>任务名称</label><input id="scheduleName" value="${esc(state.scheduleForm.name)}" placeholder="选择事务码后自动带出，可继续补充"></div>
                  <div class="field"><label>业务范围</label><select id="scheduleFactoryGroup">${factoryGroups.map(group => `<option value="${group.id}" ${state.scheduleForm.factoryGroup === group.id ? "selected" : ""}>${getFactoryGroup(group.id).name}</option>`).join("")}</select></div>
                  <div class="field"><label>执行时间</label><input id="scheduleTime" type="time" value="${esc(state.scheduleForm.execTime)}"></div>
                  <div class="field"><label>执行频率</label><select id="scheduleFrequency"><option value="daily">每天</option><option value="weekly" selected>每周</option><option value="monthly">每月</option></select></div>
                  <div class="schedule-plant-preview">
                    <div class="schedule-plant-title">对应工厂</div>
                    ${renderCodeChips(schedulePlants)}
                  </div>
                  <div class="field span-2"><label>通知规则</label><div class="check-row"><label class="radio-chip"><input type="checkbox" checked>执行前提醒</label><label class="radio-chip"><input type="checkbox" checked>成功通知</label><label class="radio-chip"><input type="checkbox" checked>失败告警</label></div></div>
                </div>
              </div>
              <div class="modal-footer"><button class="btn" data-action="close-modal">取消</button><button class="btn primary" data-action="save-schedule">${icon("save")}保存任务</button></div>
            </div>
          </div>
        `;
      }
      if (state.modal && state.modal.startsWith("config:")) {
        return renderConfigModal();
      }
      if (state.modal && state.modal.startsWith("log:")) {
        const id = state.modal.slice(4);
        const row = history.find(x => x.id === id) || history[0];
        if (!row) {
          return `
            <div class="modal-backdrop">
              <div class="modal">
                <div class="modal-header"><strong>日志详情</strong><button class="btn small" data-action="close-modal">${icon("x")}关闭</button></div>
                <div class="modal-body"><div class="notice">暂无执行历史。</div></div>
                <div class="modal-footer"><button class="btn primary" data-action="close-modal">关闭</button></div>
              </div>
            </div>
          `;
        }
        const logLines = row.logs?.length ? row.logs.map(line => `
          <div class="log-line"><span class="log-time">[${esc((line.createdAt || "").slice(11, 19) || "--:--:--")}]</span><span class="${esc((line.level || "INFO").toUpperCase() === "ERROR" ? "ERR" : (line.level || "INFO").toUpperCase())}">${esc(line.message)}</span></div>
        `).join("") : `
          <div class="log-line"><span class="log-time">[08:00:00]</span><span class="INFO">任务触发：${esc(row.task)}</span></div>
          <div class="log-line"><span class="log-time">[08:00:03]</span><span class="INFO">提交本机 SapWebLauncher</span></div>
          <div class="log-line"><span class="log-time">[08:00:45]</span><span class="${row.status === "成功" ? "OK" : "ERR"}">${esc(row.result)}</span></div>
        `;
        const fileLines = row.files?.length ? `<div style="height:14px"></div><div class="table-wrap"><table><thead><tr><th>文件</th><th>路径</th><th>大小</th></tr></thead><tbody>${row.files.map(file => `<tr><td>${esc(file.name || "-")}</td><td>${esc(file.path || "-")}</td><td>${esc(file.size || 0)}</td></tr>`).join("")}</tbody></table></div>` : "";
        return `
          <div class="modal-backdrop">
            <div class="modal">
              <div class="modal-header"><strong>${row.id} 日志详情</strong><button class="btn small" data-action="close-modal">${icon("x")}关闭</button></div>
              <div class="modal-body">
                <div class="grid cols-2">

                  ${metric("执行结果", row.status, row.result)}

              </div>
              <div class="modal-footer"><button class="btn primary" data-action="close-modal">关闭</button></div>
            </div>
          </div>
        `;
      }
      return "";
    }

      const [, kind, mode, rawId = ""] = state.modal.split(":");
      const id = decodeURIComponent(rawId);
      const isEdit = mode === "edit";
      const titleMap = {
        plant: isEdit ? "编辑工厂" : "新增工厂",
        group: isEdit ? "编辑业务范围" : "新增业务范围",
        tcode: isEdit ? "编辑事务码" : "新增事务码",
        rule: isEdit ? "编辑事务码规则" : "新增事务码规则",
        robot: isEdit ? "编辑通知机器人" : "新增通知机器人"

      return `
        <div class="modal-backdrop">
          <div class="modal">
            <div class="modal-header"><strong>${esc(titleMap[kind] || "配置")}</strong><button class="btn small" data-action="close-modal">${icon("x")}关闭</button></div>

          </div>
        </div>
      `;
    }

    function renderConfigModalBody(kind, mode, id) {
      if (kind === "plant") return renderPlantModalBody(mode, id);
      if (kind === "group") return renderGroupModalBody(mode, id);
      if (kind === "tcode") return renderTCodeModalBody(mode, id);
      if (kind === "rule") return renderRuleModalBody(mode, id);
      if (kind === "robot") return renderRobotModalBody(mode, id);
      return `<div class="notice warn">未知配置类型。</div>`;
