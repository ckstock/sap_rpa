<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>领益 SAP 自动化执行门户</title>
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
  <style>
    * { box-sizing: border-box; }
    :root {
      --bg: #f5f7fb;
      --panel: #ffffff;
      --panel-2: #f8fafc;
      --line: #e5e7eb;
      --line-strong: #cbd5e1;
      --text: #172033;
      --muted: #667085;
      --nav: #0f172a;
      --nav-soft: #1e293b;
      --blue: #1677ff;
      --blue-dark: #0958d9;
      --green: #16a34a;
      --amber: #d97706;
      --red: #dc2626;
      --cyan: #0891b2;
      --shadow: 0 10px 30px rgba(15, 23, 42, 0.08);
      --radius: 8px;
    }
    html, body { margin: 0; min-height: 100%; }
    body {
      color: var(--text);
      background: var(--bg);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", Arial, sans-serif;
      letter-spacing: 0;
    }
    button, input, select, textarea { font: inherit; }
    button { cursor: pointer; }
    .hidden { display: none !important; }
    .login-page {
      min-height: 100vh;
      display: grid;
      grid-template-columns: minmax(380px, 460px) minmax(0, 1fr);
      background:
        linear-gradient(135deg, rgba(15, 23, 42, 0.92), rgba(22, 119, 255, 0.72)),
        url("https://images.unsplash.com/photo-1581092921461-39b9d08a9b21?auto=format&fit=crop&w=1600&q=80") center/cover;
    }
    .login-panel {
      background: rgba(255,255,255,.98);
      padding: 48px 42px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      border-right: 1px solid rgba(255,255,255,.3);
    }
    .login-brand { display: flex; align-items: center; gap: 12px; margin-bottom: 34px; }
    .brand-mark {
      width: 44px; height: 44px; border-radius: 8px;
      background: #0f172a; color: #fff; display: grid; place-items: center;
    }
    .login-brand h1 { margin: 0; font-size: 24px; line-height: 1.25; }
    .login-brand p { margin: 5px 0 0; color: var(--muted); font-size: 13px; }
    .login-form { display: grid; gap: 14px; }
    .field { display: grid; gap: 7px; }
    label { color: #344054; font-size: 13px; font-weight: 600; }
    input, select, textarea {
      width: 100%;
      border: 1px solid var(--line-strong);
      border-radius: var(--radius);
      background: #fff;
      color: var(--text);
      min-height: 38px;
      padding: 9px 11px;
      outline: none;
    }
    input:focus, select:focus, textarea:focus {
      border-color: var(--blue);
      box-shadow: 0 0 0 3px rgba(22, 119, 255, 0.12);
    }
    .login-actions { display: grid; gap: 10px; margin-top: 8px; }
    .divider {
      display: grid; grid-template-columns: 1fr auto 1fr; align-items: center; gap: 10px;
      color: var(--muted); font-size: 12px; margin: 4px 0;
    }
    .divider::before, .divider::after { content: ""; height: 1px; background: var(--line); }
    .login-side {
      color: #fff;
      padding: 64px;
      display: flex;
      flex-direction: column;
      justify-content: flex-end;
      min-height: 520px;
    }
    .login-side h2 { margin: 0 0 14px; font-size: 42px; letter-spacing: 0; line-height: 1.12; }
    .login-side p { margin: 0; max-width: 620px; color: rgba(255,255,255,.86); line-height: 1.8; }
    .app-shell { min-height: 100vh; display: grid; grid-template-columns: 232px minmax(0, 1fr); }
    .sidebar {
      position: sticky; top: 0; height: 100vh;
      background: var(--nav);
      color: #fff;
      display: flex;
      flex-direction: column;
    }
    .logo {
      height: 64px;
      padding: 0 18px;
      display: flex;
      align-items: center;
      gap: 11px;
      border-bottom: 1px solid rgba(255,255,255,.08);
      font-weight: 700;
    }
    .logo .brand-mark { width: 34px; height: 34px; background: var(--blue); }
    .nav { padding: 12px; display: grid; gap: 5px; }
    .nav button {
      height: 42px;
      width: 100%;
      border: 0;
      border-radius: var(--radius);
      background: transparent;
      color: #cbd5e1;
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 0 12px;
      text-align: left;
    }
    .nav button:hover, .nav button.active { background: var(--nav-soft); color: #fff; }
    .nav button.active { box-shadow: inset 3px 0 0 var(--blue); }
    .sidebar-footer { margin-top: auto; padding: 16px; border-top: 1px solid rgba(255,255,255,.08); color: #94a3b8; font-size: 12px; line-height: 1.6; }
    .main { min-width: 0; padding: 18px 22px 32px; }
    .topbar {
      min-height: 58px;
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      box-shadow: 0 2px 10px rgba(15, 23, 42, .04);
      padding: 0 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      margin-bottom: 16px;
    }
    .breadcrumb { color: var(--muted); font-size: 13px; }
    .page-title { font-weight: 700; color: var(--text); }
    .top-actions { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; justify-content: flex-end; }
    .avatar {
      width: 32px; height: 32px; border-radius: 50%;
      background: #e0f2fe; color: #0369a1;
      display: grid; place-items: center;
      font-weight: 700;
      font-size: 13px;
    }
    .btn {
      min-height: 36px;
      border: 1px solid var(--line-strong);
      border-radius: var(--radius);
      background: #fff;
      color: var(--text);
      padding: 0 12px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 7px;
      white-space: nowrap;
    }
    .btn:hover { border-color: var(--blue); color: var(--blue); }
    .btn.primary { background: var(--blue); border-color: var(--blue); color: #fff; }
    .btn.primary:hover { background: var(--blue-dark); border-color: var(--blue-dark); color: #fff; }
    .btn.green { background: var(--green); border-color: var(--green); color: #fff; }
    .btn.red { background: var(--red); border-color: var(--red); color: #fff; }
    .btn.ghost { background: transparent; }
    .btn.small { min-height: 30px; padding: 0 9px; font-size: 12px; }
    .btn:disabled { opacity: .58; cursor: not-allowed; }
    .icon { width: 17px; height: 17px; flex: 0 0 auto; }
    .panel {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      box-shadow: 0 2px 10px rgba(15, 23, 42, .04);
      overflow: hidden;
    }
    .panel + .panel { margin-top: 16px; }
    .panel-header {
      min-height: 52px;
      padding: 0 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      border-bottom: 1px solid var(--line);
      background: #fff;
    }
    .panel-title { display: flex; align-items: center; gap: 9px; font-weight: 700; }
    .panel-sub { color: var(--muted); font-size: 12px; margin-top: 2px; }
    .panel-body { padding: 16px; }
    .grid { display: grid; gap: 16px; }
    .grid.cols-2 { grid-template-columns: minmax(0, 1fr) minmax(0, 1fr); }
    .grid.cols-3 { grid-template-columns: repeat(3, minmax(0, 1fr)); }
    .grid.cols-4 { grid-template-columns: repeat(4, minmax(0, 1fr)); }
    .metric {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      padding: 15px;
      display: grid;
      gap: 7px;
    }
    .metric .label { color: var(--muted); font-size: 12px; }
    .metric .value { font-size: 24px; font-weight: 800; }
    .metric .hint { color: var(--muted); font-size: 12px; }
    .quick-actions { display: grid; grid-template-columns: repeat(4, minmax(150px, 1fr)); gap: 12px; }
    .action-card {
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: #fff;
      padding: 14px;
      display: grid;
      gap: 10px;
      transition: border-color .16s, box-shadow .16s, transform .16s;
    }
    .action-card:hover { border-color: #93c5fd; box-shadow: var(--shadow); transform: translateY(-1px); }
    .action-top { display: flex; justify-content: space-between; align-items: flex-start; gap: 8px; }
    .action-name { font-weight: 800; font-size: 16px; }
    .action-desc { color: var(--muted); font-size: 12px; margin-top: 4px; }
    .badge, .tag {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      min-height: 22px;
      border-radius: 999px;
      padding: 0 8px;
      font-size: 12px;
      border: 1px solid transparent;
      white-space: nowrap;
    }
    .badge.viewer { background: #eff6ff; color: #1d4ed8; border-color: #bfdbfe; }
    .badge.executor { background: #ecfdf5; color: #047857; border-color: #bbf7d0; }
    .tag.ok { background: #ecfdf5; color: #047857; border-color: #bbf7d0; }
    .tag.info { background: #eff6ff; color: #1d4ed8; border-color: #bfdbfe; }
    .tag.warn { background: #fffbeb; color: #b45309; border-color: #fde68a; }
    .tag.err { background: #fef2f2; color: #b91c1c; border-color: #fecaca; }
    .table-wrap { overflow-x: auto; }
    table { width: 100%; border-collapse: collapse; min-width: 760px; }
    th, td { padding: 11px 12px; border-bottom: 1px solid var(--line); text-align: left; font-size: 13px; vertical-align: middle; }
    th { background: #f8fafc; color: #475467; font-weight: 700; }
    tbody tr:hover { background: #f9fbff; }
    .form-grid { display: grid; grid-template-columns: repeat(3, minmax(0, 1fr)); gap: 14px; }
    .form-grid .span-2 { grid-column: span 2; }
    .radio-row, .check-row { display: flex; gap: 14px; flex-wrap: wrap; }
    .radio-chip {
      min-height: 38px;
      display: inline-flex;
      align-items: center;
      gap: 7px;
      border: 1px solid var(--line-strong);
      border-radius: var(--radius);
      padding: 0 10px;
      background: #fff;
    }
    .radio-chip input { width: auto; min-height: 0; }
    .notice {
      border: 1px solid #bfdbfe;
      background: #eff6ff;
      color: #1e3a8a;
      border-radius: var(--radius);
      padding: 12px 14px;
      line-height: 1.65;
      font-size: 13px;
    }
    .notice.warn { border-color: #fde68a; background: #fffbeb; color: #78350f; }
    .notice.ok { border-color: #bbf7d0; background: #ecfdf5; color: #064e3b; }
    .steps { display: grid; gap: 10px; }
    .step {
      display: grid;
      grid-template-columns: 28px minmax(0, 1fr) auto;
      gap: 10px;
      align-items: center;
      min-height: 38px;
    }
    .step-icon {
      width: 24px; height: 24px; border-radius: 50%;
      display: grid; place-items: center;
      background: #e5e7eb; color: #64748b;
      font-size: 12px; font-weight: 800;
    }
    .step.done .step-icon { background: #dcfce7; color: var(--green); }
    .step.run .step-icon { background: #dbeafe; color: var(--blue); animation: pulse 1.2s infinite; }
    .step.fail .step-icon { background: #fee2e2; color: var(--red); }
    .step-text { font-size: 13px; }
    .step-time { font-size: 12px; color: var(--muted); }
    @keyframes pulse { 0%,100% { transform: scale(1); opacity: 1; } 50% { transform: scale(.92); opacity: .68; } }
    .log {
      background: #101828;
      color: #d0d5dd;
      border-radius: var(--radius);
      padding: 12px;
      height: 238px;
      overflow: auto;
      font-family: Consolas, "Microsoft YaHei UI", monospace;
      font-size: 12px;
      line-height: 1.7;
    }
    .log-line { border-bottom: 1px solid rgba(255,255,255,.07); padding: 2px 0; }
    .log-time { color: #86efac; margin-right: 8px; }
    .log .INFO { color: #93c5fd; }
    .log .OK { color: #86efac; }
    .log .WARN { color: #fcd34d; }
    .log .ERR { color: #fca5a5; }
    .tabs { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 14px; }
    .tab {
      border: 1px solid var(--line-strong);
      background: #fff;
      border-radius: var(--radius);
      min-height: 34px;
      padding: 0 11px;
      display: inline-flex;
      align-items: center;
      gap: 6px;
    }
    .tab.active { color: var(--blue); border-color: #93c5fd; background: #eff6ff; }
    .modal-backdrop {
      position: fixed; inset: 0; z-index: 20;
      background: rgba(15, 23, 42, .48);
      display: grid;
      place-items: center;
      padding: 18px;
    }
    .modal {
      width: min(720px, 100%);
      max-height: 86vh;
      overflow: auto;
      background: #fff;
      border-radius: var(--radius);
      box-shadow: 0 24px 80px rgba(0,0,0,.25);
    }
    .modal-header, .modal-footer {
      min-height: 56px;
      padding: 0 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-bottom: 1px solid var(--line);
    }
    .modal-footer { border-top: 1px solid var(--line); border-bottom: 0; justify-content: flex-end; gap: 10px; }
    .modal-body { padding: 16px; }
    .toast-wrap {
      position: fixed;
      right: 18px;
      bottom: 18px;
      z-index: 30;
      display: grid;
      gap: 8px;
    }
    .toast {
      min-width: 260px;
      max-width: 420px;
      background: #fff;
      border: 1px solid var(--line);
      border-left: 4px solid var(--blue);
      box-shadow: var(--shadow);
      border-radius: var(--radius);
      padding: 10px 12px;
      color: var(--text);
      line-height: 1.5;
      font-size: 13px;
    }
    .toast.ok { border-left-color: var(--green); }
    .toast.warn { border-left-color: var(--amber); }
    .toast.err { border-left-color: var(--red); }
    @media (max-width: 1040px) {
      .quick-actions, .grid.cols-4 { grid-template-columns: repeat(2, minmax(0, 1fr)); }
      .grid.cols-3, .grid.cols-2 { grid-template-columns: 1fr; }
      .form-grid { grid-template-columns: 1fr; }
      .form-grid .span-2 { grid-column: auto; }
    }
    @media (max-width: 760px) {
      .login-page { grid-template-columns: 1fr; }
      .login-side { display: none; }
      .login-panel { min-height: 100vh; padding: 28px 20px; }
      .app-shell { grid-template-columns: 1fr; }
      .sidebar { position: static; height: auto; }
      .nav { grid-template-columns: repeat(2, minmax(0, 1fr)); }
      .sidebar-footer { display: none; }
      .main { padding: 12px; }
      .topbar { align-items: flex-start; flex-direction: column; padding: 12px; }
      .quick-actions, .grid.cols-4 { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <div id="app"></div>
  <div id="toastWrap" class="toast-wrap"></div>

  <script>
    const state = {
      loggedIn: localStorage.getItem("portalLoggedIn") === "1",
      page: "dashboard",
      role: localStorage.getItem("portalRole") || "executor",
      user: { name: localStorage.getItem("portalUser") || "张三", dept: "财务共享中心" },
      bridgeBase: localStorage.getItem("bridgeBase") || "http://127.0.0.1:17890",
      scheme: localStorage.getItem("scheme") || "sap-zck",
      activeConfigTab: "plant",
      selectedTCode: "ZFI019NL",
      executing: false,
      bridgeStatus: "未检测",
      currentRun: null,
      modal: null,
      form: {
        account: "",
        password: "",
        tCode: "ZFI019NL",
        plant: "1024",
        period: "2026-06",
        businessArea: "L001",
        mode: "bridge",
        priority: "high",
        notify: true,
        remark: ""
      },
      steps: [
        { text: "创建执行任务", status: "pending", time: "" },
        { text: "唤醒本机执行器", status: "pending", time: "" },
        { text: "SAP 登录与参数注入", status: "pending", time: "" },
        { text: "执行报表并采集状态", status: "pending", time: "" },
        { text: "生成结果并推送通知", status: "pending", time: "" }
      ],
      logs: [],
      scheduleForm: {
        name: "每周一 ZFI019NL 自动执行",
        tCode: "ZFI019NL",
        plant: "1024",
        execTime: "08:00",
        frequency: "weekly",
        priority: "high",
        notifyStart: true,
        notifySuccess: true,
        notifyFail: true
      }
    };

    const tCodes = [
      { code: "ZFI019NL", name: "周损益报表", module: "FI", timeout: 300, retry: 3, enabled: true },
      { code: "ZFI072", name: "采购价维护", module: "MM", timeout: 180, retry: 2, enabled: true },
      { code: "ZFI057", name: "产值拆分", module: "CO", timeout: 600, retry: 3, enabled: true },
      { code: "ZCO019", name: "标准成本", module: "CO", timeout: 240, retry: 2, enabled: true },
      { code: "ZFI080", name: "实际材料保存", module: "FI", timeout: 180, retry: 2, enabled: true }
    ];
    const plants = [
      { code: "1024", name: "平湖三厂", area: "L001", bg: "精密制造", enabled: true },
      { code: "1032", name: "平湖三十厂", area: "L001", bg: "精密制造", enabled: true },
      { code: "6041", name: "平湖三厂", area: "L004", bg: "结构件", enabled: true },
      { code: "5021", name: "集采工厂", area: "P001", bg: "供应链", enabled: false }
    ];
    const robots = [
      { id: "rbt-001", name: "财务部通知群", group: "SAP 自动执行通知群", events: "执行完成、执行失败", enabled: true, lastPush: "2026/06/07 08:05" },
      { id: "rbt-002", name: "IT 运维告警群", group: "SAP 运维告警", events: "系统异常、执行失败", enabled: true, lastPush: "2026/06/07 14:30" }
    ];
    const scheduleTasks = [
      { id: "SCH-001", name: "周一 ZFI019NL 自动执行", tCode: "ZFI019NL", plant: "1024,1032", time: "08:00", frequency: "每周一", priority: "高", next: "2026/06/15 08:00", status: "启用" },
      { id: "SCH-002", name: "月末 ZFI080 保存", tCode: "ZFI080", plant: "1022,1024", time: "18:00", frequency: "每月末", priority: "中", next: "2026/06/30 18:00", status: "启用" }
    ];
    const history = [
      { id: "RUN-20260608-001", time: "2026/06/08 08:00", task: "周一 ZFI019NL 自动执行", tCode: "ZFI019NL", plant: "1024", duration: "45 秒", status: "成功", notify: "已推送", result: "生成周损益结果 18 行" },
      { id: "RUN-20260607-004", time: "2026/06/07 18:30", task: "采购价维护", tCode: "ZFI072", plant: "5021", duration: "32 秒", status: "成功", notify: "已推送", result: "更新 23 条价格记录" },
      { id: "RUN-20260607-002", time: "2026/06/07 08:00", task: "周一 ZFI019NL 自动执行", tCode: "ZFI019NL", plant: "1032", duration: "1 分 23 秒", status: "失败", notify: "告警已推送", result: "SAP 连接超时" }
    ];

    const pages = {
      dashboard: "工作台",
      execute: "执行任务",
      schedule: "定时任务",
      config: "基础配置",
      report: "统计报表",
      history: "执行历史",
      settings: "系统设置"
    };

    const icon = (name, cls = "icon") => `<i class="${cls}" data-lucide="${name}"></i>`;
    const esc = value => String(value ?? "").replace(/[&<>"']/g, c => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[c]));
    const app = document.getElementById("app");

    function render() {
      app.innerHTML = state.loggedIn ? renderShell() : renderLogin();
      bindEvents();
      lucide.createIcons();
    }

    function renderLogin() {
      return `
        <section class="login-page">
          <div class="login-panel">
            <div class="login-brand">
              <div class="brand-mark">${icon("workflow")}</div>
              <div>
                <h1>领益 SAP 自动化执行门户</h1>
                <p>SAP Automation Portal</p>
              </div>
            </div>
            <div class="login-form">
              <button class="btn primary" data-action="dingtalk-login">${icon("scan-line")}钉钉扫码登录</button>
              <div class="divider">或使用账号登录</div>
              <div class="field">
                <label for="loginAccount">钉钉账号/手机号</label>
                <input id="loginAccount" value="${esc(state.form.account)}" placeholder="请输入账号">
              </div>
              <div class="field">
                <label for="loginPassword">密码</label>
                <input id="loginPassword" type="password" value="${esc(state.form.password)}" placeholder="请输入密码">
              </div>
              <div class="login-actions">
                <button class="btn primary" data-action="login">${icon("log-in")}登录</button>
              </div>
            </div>
          </div>
          <div class="login-side">
            <h2>本机执行 SAP，页面集中调度和看结果</h2>
            <p>前端可以部署到 Netlify、IIS 或企业门户；每台执行电脑安装本机 Bridge 或 SapWebLauncher。Bridge 模式负责把脚本执行状态、报表结果和日志回传到页面。</p>
          </div>
        </section>
      `;
    }

    function renderShell() {
      return `
        <div class="app-shell">
          <aside class="sidebar">
            <div class="logo"><span class="brand-mark">${icon("workflow")}</span><span>领益 SAP 门户</span></div>
            <nav class="nav">

    function navButton(page, iconName, text) {
      return `<button class="${state.page === page ? "active" : ""}" data-page="${page}">${icon(iconName)}${text}</button>`;
    }

    function renderPageSubTitle() {
      const subtitles = {
        dashboard: "查看今日运行、快速发起 ZFI019NL 和本机执行器状态。",
        execute: "选择事务码和执行参数，提交给本机 Bridge 或 SapWebLauncher。",
        schedule: "维护固定频率任务，后续可交给后台或本机服务定时触发。",
        config: "维护工厂、事务码、通知机器人和本机 Bridge 地址。",
        report: "按事务码、工厂和成功率统计执行质量。",
        history: "查看最近执行日志和状态回传结果。",
        settings: "设置执行模式、通知策略和本地连接参数。"
      };
      return subtitles[state.page] || "";
    }

    function renderCurrentPage() {
      const map = {
        dashboard: renderDashboard,
        execute: renderExecute,
        schedule: renderSchedule,
        config: renderConfig,
        report: renderReport,
        history: renderHistory,
        settings: renderSettings
      };
      return (map[state.page] || renderDashboard)();
    }

    function renderDashboard() {
      return `
        <section class="grid cols-4">
          ${metric("今日执行", "18", "成功 17 / 失败 1")}
          ${metric("ZFI019NL", "97.3%", "最近 7 天成功率")}
          ${metric("平均耗时", "46s", "Bridge 回传统计")}
          ${metric("本机状态", state.bridgeStatus, "执行电脑 127.0.0.1")}
        </section>
        <section class="panel">
          <div class="panel-header">
            <div><div class="panel-title">${icon("zap")}快速操作</div><div class="panel-sub">从常用事务码直接进入执行页</div></div>
            <button class="btn small" data-action="check-bridge">${icon("activity")}检测 Bridge</button>
          </div>
          <div class="panel-body">
            <div class="quick-actions">
              ${quickAction("ZFI019NL", "周损益报表", "FI", "bar-chart-3")}
              ${quickAction("ZFI072", "采购价维护", "MM", "circle-dollar-sign")}
              ${quickAction("ZFI057", "产值拆分", "CO", "trending-up")}
              ${quickAction("ZCO019", "标准成本", "CO", "tag")}
            </div>
          </div>
        </section>
        <section class="grid cols-2">
          <div class="panel">
            <div class="panel-header"><div class="panel-title">${icon("activity")}执行器状态</div></div>
            <div class="panel-body">
              <div class="notice ${state.bridgeStatus === "在线" ? "ok" : "warn"}">
                Bridge 模式可以回传脚本执行状态、报表结果和日志；只用 SapWebLauncher 协议唤醒时，浏览器无法直接拿到执行后的结果状态。
              </div>
              <div style="height:12px"></div>
              <div class="grid cols-2">
                ${metric("Bridge 地址", state.bridgeBase, "本机 API")}
                ${metric("协议唤醒", state.scheme + "://", "备用模式")}
              </div>
            </div>
          </div>
          <div class="panel">
            <div class="panel-header"><div class="panel-title">${icon("list-checks")}最近运行</div></div>
            <div class="panel-body table-wrap">${historyTable(history.slice(0, 4))}</div>
          </div>
        </section>
      `;
    }

    function metric(label, value, hint) {
      return `<div class="metric"><div class="label">${esc(label)}</div><div class="value">${esc(value)}</div><div class="hint">${esc(hint)}</div></div>`;
    }

    function quickAction(code, desc, moduleName, iconName) {
      return `
        <div class="action-card">
          <div class="action-top">
            <div>
              <div class="action-name">${esc(code)}</div>
              <div class="action-desc">${esc(desc)}</div>
            </div>
            <span class="tag info">${esc(moduleName)}</span>
          </div>
          <button class="btn primary" data-action="go-execute" data-tcode="${esc(code)}">${icon(iconName)}执行</button>
        </div>
      `;
    }

    function renderExecute() {
      return `
        <section class="grid cols-2">
          <div class="panel">
            <div class="panel-header">
              <div><div class="panel-title">${icon("play-circle")}${esc(state.form.tCode)} 执行任务</div><div class="panel-sub">提交给本机执行器，由本机完成 SAP 登录和脚本动作</div></div>
              <span class="tag ${state.role === "executor" ? "ok" : "warn"}">${state.role === "executor" ? "可执行" : "只读"}</span>
            </div>
            <div class="panel-body">
              ${state.role === "viewer" ? `<div class="notice warn">当前是查询员角色，不能发起 SAP 执行。切换为执行员后再提交任务。</div><div style="height:14px"></div>` : ""}
              <div class="form-grid">
                <div class="field">
                  <label for="tCode">事务码</label>
                  <select id="tCode" data-bind="tCode">${tCodes.map(x => `<option value="${x.code}" ${state.form.tCode === x.code ? "selected" : ""}>${x.code} - ${x.name}</option>`).join("")}</select>
                </div>
                <div class="field">
                  <label for="plant">执行工厂</label>
                  <select id="plant" data-bind="plant">${plants.map(x => `<option value="${x.code}" ${state.form.plant === x.code ? "selected" : ""}>${x.code} - ${x.name}</option>`).join("")}</select>
                </div>
                <div class="field">
                  <label for="period">期间</label>
                  <input id="period" data-bind="period" value="${esc(state.form.period)}" placeholder="YYYY-MM">
                </div>
                <div class="field">
                  <label for="businessArea">业务范围</label>
                  <input id="businessArea" data-bind="businessArea" value="${esc(state.form.businessArea)}">
                </div>
                <div class="field">
                  <label for="priority">优先级</label>
                  <select id="priority" data-bind="priority">
                    <option value="high" ${state.form.priority === "high" ? "selected" : ""}>高 - 优先执行</option>
                    <option value="medium" ${state.form.priority === "medium" ? "selected" : ""}>中 - 正常执行</option>
                    <option value="low" ${state.form.priority === "low" ? "selected" : ""}>低 - 空闲执行</option>
                  </select>
                </div>
                <div class="field">
                  <label>执行方式</label>
                  <div class="radio-row">
                    <label class="radio-chip"><input type="radio" name="mode" value="bridge" ${state.form.mode === "bridge" ? "checked" : ""}>Bridge 回传</label>
                    <label class="radio-chip"><input type="radio" name="mode" value="protocol" ${state.form.mode === "protocol" ? "checked" : ""}>协议唤醒</label>
                  </div>
                </div>
                <div class="field span-2">
                  <label for="remark">备注</label>
                  <input id="remark" data-bind="remark" value="${esc(state.form.remark)}" placeholder="可填写本次执行说明">
                </div>
                <div class="field">
                  <label>通知</label>
                  <label class="radio-chip"><input type="checkbox" id="notify" ${state.form.notify ? "checked" : ""}>完成后推送钉钉</label>
                </div>
              </div>
              <div style="height:16px"></div>
              <div class="top-actions" style="justify-content:flex-start">
                <button class="btn primary" data-action="start-run" ${state.role !== "executor" || state.executing ? "disabled" : ""}>${icon("play")}开始执行</button>
                <button class="btn" data-action="check-bridge">${icon("activity")}检测 Bridge</button>
                <button class="btn" data-action="wake-protocol">${icon("radio")}只唤醒 SapWebLauncher</button>
              </div>
            </div>
          </div>
          <div class="panel">
            <div class="panel-header"><div><div class="panel-title">${icon("route")}执行进度</div><div class="panel-sub">${state.currentRun ? esc(state.currentRun.id) : "尚未提交任务"}</div></div></div>
            <div class="panel-body">
              <div class="steps">${state.steps.map((step, i) => renderStep(step, i)).join("")}</div>
              <div style="height:14px"></div>
              <div class="log" id="logBox">${state.logs.length ? state.logs.map(renderLog).join("") : `<div class="log-line"><span class="log-time">[--:--:--]</span><span class="INFO">等待执行。</span></div>`}</div>
            </div>
          </div>
        </section>
      `;
    }

    function renderStep(step, i) {
      const cls = step.status === "done" ? "done" : step.status === "run" ? "run" : step.status === "fail" ? "fail" : "";
      const mark = step.status === "done" ? "✓" : step.status === "fail" ? "!" : (i + 1);
      return `<div class="step ${cls}"><span class="step-icon">${mark}</span><span class="step-text">${esc(step.text)}</span><span class="step-time">${esc(step.time)}</span></div>`;
    }

    function renderLog(line) {
      return `<div class="log-line"><span class="log-time">[${esc(line.time)}]</span><span class="${esc(line.type)}">${esc(line.message)}</span></div>`;
    }

    function renderSchedule() {
      return `
        <section class="panel">
          <div class="panel-header">
            <div><div class="panel-title">${icon("calendar-clock")}定时自动执行配置</div><div class="panel-sub">当前静态站点不直接定时，后续由 Bridge 服务或服务器后台承接调度</div></div>
            <button class="btn primary" data-action="open-schedule-modal">${icon("plus")}新建定时任务</button>
          </div>
          <div class="panel-body">
            <div class="notice">定时任务可先在页面维护配置，真正执行时需要本机 Bridge 常驻或服务器后台调度。执行完成后由 Bridge/API 回传状态并推送钉钉。</div>
            <div style="height:14px"></div>
            <div class="table-wrap">
              <table>
                <thead><tr><th>任务 ID</th><th>任务名称</th><th>事务码</th><th>工厂</th><th>优先级</th><th>时间</th><th>频率</th><th>状态</th><th>下次执行</th><th>操作</th></tr></thead>
                <tbody>${scheduleTasks.map(task => `
                  <tr>
                    <td>${task.id}</td><td>${task.name}</td><td>${task.tCode}</td><td>${task.plant}</td><td>${task.priority}</td>
                    <td>${task.time}</td><td>${task.frequency}</td><td><span class="tag ok">${task.status}</span></td><td>${task.next}</td>
                    <td><button class="btn small" data-action="open-schedule-modal">${icon("pencil")}编辑</button></td>
                  </tr>`).join("")}</tbody>
              </table>
            </div>
          </div>
        </section>
      `;
    }

    function renderConfig() {
      return `
        <section class="panel">
          <div class="panel-header">
            <div><div class="panel-title">${icon("sliders-horizontal")}基础配置</div><div class="panel-sub">维护执行参数来源，后续可接入后端保存</div></div>
          </div>
          <div class="panel-body">
            <div class="tabs">
              ${tabButton("plant", "factory", "工厂配置")}
              ${tabButton("tcode", "terminal", "事务码配置")}
              ${tabButton("robot", "message-circle", "通知机器人")}
              ${tabButton("bridge", "plug", "本机 Bridge")}
            </div>
            ${renderConfigTab()}
          </div>
        </section>
      `;
    }

    function tabButton(tab, iconName, text) {
      return `<button class="tab ${state.activeConfigTab === tab ? "active" : ""}" data-config-tab="${tab}">${icon(iconName)}${text}</button>`;
    }

    function renderConfigTab() {
      if (state.activeConfigTab === "plant") {
        return `<div class="table-wrap"><table><thead><tr><th>工厂代码</th><th>工厂名称</th><th>业务范围</th><th>所属 BG</th><th>状态</th><th>操作</th></tr></thead><tbody>${plants.map(p => `<tr><td><strong>${p.code}</strong></td><td>${p.name}</td><td>${p.area}</td><td>${p.bg}</td><td><span class="tag ${p.enabled ? "ok" : "warn"}">${p.enabled ? "启用" : "停用"}</span></td><td><button class="btn small" data-action="toast-edit">${icon("pencil")}编辑</button></td></tr>`).join("")}</tbody></table></div>`;
      }
      if (state.activeConfigTab === "tcode") {
        return `<div class="table-wrap"><table><thead><tr><th>事务码</th><th>名称</th><th>模块</th><th>超时秒数</th><th>重试</th><th>状态</th><th>操作</th></tr></thead><tbody>${tCodes.map(t => `<tr><td><strong>${t.code}</strong></td><td>${t.name}</td><td>${t.module}</td><td>${t.timeout}</td><td>${t.retry}</td><td><span class="tag ok">启用</span></td><td><button class="btn small" data-action="toast-edit">${icon("pencil")}编辑</button></td></tr>`).join("")}</tbody></table></div>`;
      }
      if (state.activeConfigTab === "robot") {
        return `<div class="table-wrap"><table><thead><tr><th>机器人</th><th>钉钉群</th><th>事件</th><th>状态</th><th>最近推送</th><th>操作</th></tr></thead><tbody>${robots.map(r => `<tr><td>${r.name}</td><td>${r.group}</td><td>${r.events}</td><td><span class="tag ok">启用</span></td><td>${r.lastPush}</td><td><button class="btn small" data-action="test-robot">${icon("send")}测试推送</button></td></tr>`).join("")}</tbody></table></div>`;
      }
      return `
        <div class="grid cols-2">
          <div class="field">
            <label for="bridgeBase">Bridge API 地址</label>
            <input id="bridgeBase" value="${esc(state.bridgeBase)}">
          </div>
          <div class="field">
            <label for="scheme">SapWebLauncher 协议名</label>
            <input id="scheme" value="${esc(state.scheme)}">
          </div>
        </div>
        <div style="height:12px"></div>
        <div class="notice warn">Netlify 页面访问 127.0.0.1 时，Bridge 需要允许当前站点域名的 CORS，并处理浏览器 Private Network Access 预检。只使用自定义协议时，页面只能唤醒程序，不能直接拿到脚本执行结果。</div>
        <div style="height:12px"></div>
        <div class="top-actions" style="justify-content:flex-start">
          <button class="btn primary" data-action="save-bridge">${icon("save")}保存</button>
          <button class="btn" data-action="check-bridge">${icon("activity")}检测连接</button>
        </div>
      `;
    }

    function renderReport() {
      const total = history.length;
      const ok = history.filter(x => x.status === "成功").length;
      const rate = Math.round(ok / total * 1000) / 10;
      return `
        <section class="grid cols-4">
          ${metric("执行总次数", "995", "近 30 天")}
          ${metric("成功率", rate + "%", "本页样例数据")}
          ${metric("失败告警", "13", "已推送钉钉")}
          ${metric("平均耗时", "52s", "按事务码汇总")}
        </section>
        <section class="grid cols-2">
          <div class="panel">
            <div class="panel-header"><div class="panel-title">${icon("bar-chart-3")}事务码执行排行</div></div>
            <div class="panel-body table-wrap">
              <table><thead><tr><th>排名</th><th>事务码</th><th>执行次数</th><th>成功</th><th>失败</th><th>成功率</th><th>平均耗时</th></tr></thead><tbody>
                <tr><td>1</td><td>ZFI019NL</td><td>485</td><td>472</td><td>13</td><td>97.3%</td><td>45s</td></tr>
                <tr><td>2</td><td>ZFI057</td><td>312</td><td>298</td><td>14</td><td>95.5%</td><td>128s</td></tr>
                <tr><td>3</td><td>ZFI080</td><td>198</td><td>195</td><td>3</td><td>98.5%</td><td>32s</td></tr>
              </tbody></table>
            </div>
          </div>

            <div class="panel-body table-wrap">
              <table><thead><tr><th>工厂</th><th>名称</th><th>执行次数</th><th>成功</th><th>失败</th><th>成功率</th><th>最新执行</th></tr></thead><tbody>
                <tr><td>1024</td><td>平湖三厂</td><td>356</td><td>349</td><td>7</td><td>98.0%</td><td>2026/06/08 08:00</td></tr>
                <tr><td>1032</td><td>平湖三十厂</td><td>288</td><td>276</td><td>12</td><td>95.8%</td><td>2026/06/07 08:00</td></tr>
                <tr><td>6041</td><td>平湖三厂</td><td>192</td><td>188</td><td>4</td><td>97.9%</td><td>2026/06/06 18:30</td></tr>
              </tbody></table>
            </div>
          </div>
        </section>
      `;
    }

    function renderHistory() {
      return `
        <section class="panel">
          <div class="panel-header">
            <div><div class="panel-title">${icon("history")}执行历史</div><div class="panel-sub">状态来自 Bridge 回传或本地模拟记录</div></div>
            <button class="btn" data-action="export-history">${icon("download")}导出</button>

          <div class="panel-body table-wrap">${historyTable(history)}</div>

    function historyTable(rows) {
      return `
        <table>
          <thead><tr><th>执行时间</th><th>任务名称</th><th>事务码</th><th>工厂</th><th>时长</th><th>状态</th><th>通知</th><th>结果摘要</th><th>操作</th></tr></thead>

            <td><span class="tag ${row.status === "成功" ? "ok" : "err"}">${row.status}</span></td><td>${row.notify}</td><td>${row.result}</td>
            <td><button class="btn small" data-action="view-log" data-run="${row.id}">${icon("file-text")}日志</button></td>
          </tr>`).join("")}</tbody>
        </table>
      `;

    function renderSettings() {
      return `
        <section class="panel">
          <div class="panel-header"><div><div class="panel-title">${icon("settings")}系统设置</div><div class="panel-sub">静态部署阶段保存在浏览器本地</div></div></div>
          <div class="panel-body">
            <div class="grid cols-2">
              <div class="field">
                <label for="settingsBridge">默认 Bridge API</label>
                <input id="settingsBridge" value="${esc(state.bridgeBase)}">

                <label for="settingsMode">默认执行方式</label>

    function renderModal() {
      if (state.modal === "schedule") {
        return `
          <div class="modal-backdrop">
            <div class="modal">
              <div class="modal-header"><strong>新建定时任务</strong><button class="btn small" data-action="close-modal">${icon("x")}关闭</button></div>
              <div class="modal-body">
                <div class="form-grid">
                  <div class="field span-2"><label>任务名称</label><input id="scheduleName" value="${esc(state.scheduleForm.name)}"></div>
                  <div class="field"><label>事务码</label><select id="scheduleTCode">${tCodes.map(t => `<option value="${t.code}" ${state.scheduleForm.tCode === t.code ? "selected" : ""}>${t.code} - ${t.name}</option>`).join("")}</select></div>
                  <div class="field"><label>执行工厂</label><select id="schedulePlant">${plants.map(p => `<option value="${p.code}" ${state.scheduleForm.plant === p.code ? "selected" : ""}>${p.code} - ${p.name}</option>`).join("")}</select></div>
                  <div class="field"><label>执行时间</label><input id="scheduleTime" type="time" value="${esc(state.scheduleForm.execTime)}"></div>
                  <div class="field"><label>执行频率</label><select id="scheduleFrequency"><option value="daily">每天</option><option value="weekly" selected>每周</option><option value="monthly">每月</option></select></div>
                  <div class="field span-2"><label>通知规则</label><div class="check-row"><label class="radio-chip"><input type="checkbox" checked>执行前提醒</label><label class="radio-chip"><input type="checkbox" checked>成功通知</label><label class="radio-chip"><input type="checkbox" checked>失败告警</label></div></div>
                </div>
              </div>
              <div class="modal-footer"><button class="btn" data-action="close-modal">取消</button><button class="btn primary" data-action="save-schedule">${icon("save")}保存任务</button></div>
            </div>
          </div>
        `;
      }
      if (state.modal && state.modal.startsWith("log:")) {
        const id = state.modal.slice(4);
        const row = history.find(x => x.id === id) || history[0];
        return `
          <div class="modal-backdrop">
            <div class="modal">
              <div class="modal-header"><strong>${row.id} 日志详情</strong><button class="btn small" data-action="close-modal">${icon("x")}关闭</button></div>
              <div class="modal-body">
                <div class="grid cols-2">
                  ${metric("事务码", row.tCode, row.task)}
                  ${metric("执行结果", row.status, row.result)}
                </div>
                <div style="height:14px"></div>
                <div class="log">
                  <div class="log-line"><span class="log-time">[08:00:00]</span><span class="INFO">任务触发：${row.task}</span></div>
                  <div class="log-line"><span class="log-time">[08:00:03]</span><span class="INFO">提交本机 Bridge / SapWebLauncher</span></div>
                  <div class="log-line"><span class="log-time">[08:00:45]</span><span class="${row.status === "成功" ? "OK" : "ERR"}">${row.result}</span></div>
                </div>
              </div>
              <div class="modal-footer"><button class="btn primary" data-action="close-modal">关闭</button></div>
            </div>
          </div>
        `;
      }
      return "";
    }

    function bindEvents() {
      document.querySelectorAll("[data-page]").forEach(btn => btn.addEventListener("click", () => { state.page = btn.dataset.page; render(); }));
      document.querySelectorAll("[data-config-tab]").forEach(btn => btn.addEventListener("click", () => { state.activeConfigTab = btn.dataset.configTab; render(); }));
      document.querySelectorAll("[data-bind]").forEach(input => input.addEventListener("input", () => { state.form[input.dataset.bind] = input.value; }));
      document.querySelectorAll("input[name='mode']").forEach(input => input.addEventListener("change", () => { state.form.mode = input.value; }));
      const notify = document.getElementById("notify");
      if (notify) notify.addEventListener("change", () => { state.form.notify = notify.checked; });
      document.querySelectorAll("[data-action]").forEach(el => el.addEventListener("click", () => handleAction(el)));
    }

    function handleAction(el) {
      const action = el.dataset.action;
      if (action === "login" || action === "dingtalk-login") return login();
      if (action === "logout") return logout();
      if (action === "toggle-role") return toggleRole();
      if (action === "go-execute") return goExecute(el.dataset.tcode);
      if (action === "check-bridge") return checkBridge();
      if (action === "wake-protocol") return wakeProtocol();
      if (action === "start-run") return startRun();
      if (action === "save-bridge") return saveBridge();
      if (action === "save-settings") return saveSettings();
      if (action === "open-schedule-modal") { state.modal = "schedule"; return render(); }
      if (action === "close-modal") { state.modal = null; return render(); }
      if (action === "save-schedule") { state.modal = null; toast("定时任务已保存到本地示例配置", "ok"); return render(); }
      if (action === "test-robot") return toast("已模拟发送钉钉测试消息", "ok");
      if (action === "toast-edit") return toast("编辑弹窗后续接入后台保存", "info");
      if (action === "export-history") return exportHistory();
      if (action === "view-log") { state.modal = "log:" + el.dataset.run; return render(); }
    }

    function login() {
      const account = document.getElementById("loginAccount")?.value || "张三";
      state.user.name = account.trim() || "张三";
      localStorage.setItem("portalUser", state.user.name);
      localStorage.setItem("portalLoggedIn", "1");
      state.loggedIn = true;
      toast("登录成功", "ok");
      render();
    }

    function logout() {
      localStorage.removeItem("portalLoggedIn");
      state.loggedIn = false;
      state.page = "dashboard";
      render();
    }

    function toggleRole() {
      state.role = state.role === "viewer" ? "executor" : "viewer";
      localStorage.setItem("portalRole", state.role);
      toast("已切换为" + (state.role === "viewer" ? "查询员" : "执行员"), "ok");
      render();
    }

    function goExecute(tCode) {
      state.form.tCode = tCode;
      state.selectedTCode = tCode;
      state.page = "execute";
      render();
    }

    function saveBridge() {
      const bridge = document.getElementById("bridgeBase")?.value?.trim();
      const scheme = document.getElementById("scheme")?.value?.trim();
      if (bridge) state.bridgeBase = bridge;
      if (scheme) state.scheme = scheme;
      localStorage.setItem("bridgeBase", state.bridgeBase);
      localStorage.setItem("scheme", state.scheme);
      toast("本机执行器配置已保存", "ok");
      render();
    }

    function saveSettings() {
      const bridge = document.getElementById("settingsBridge")?.value?.trim();
      const scheme = document.getElementById("settingsScheme")?.value?.trim();
      const mode = document.getElementById("settingsMode")?.value;
      const user = document.getElementById("settingsUser")?.value?.trim();
      if (bridge) state.bridgeBase = bridge;
      if (scheme) state.scheme = scheme;
      if (mode) state.form.mode = mode;
      if (user) state.user.name = user;
      localStorage.setItem("bridgeBase", state.bridgeBase);
      localStorage.setItem("scheme", state.scheme);
      localStorage.setItem("portalUser", state.user.name);
      toast("设置已保存", "ok");
      render();
    }

    async function checkBridge() {
      toast("正在检测本机 Bridge", "info");
      try {
        const response = await fetch(state.bridgeBase.replace(/\/$/, "") + "/health", { method: "GET" });
        if (!response.ok) throw new Error("HTTP " + response.status);
        state.bridgeStatus = "在线";
        toast("Bridge 在线，可以回传执行状态", "ok");
      } catch (error) {
        state.bridgeStatus = "离线";
        toast("未检测到 Bridge。若只用 SapWebLauncher，可唤醒但无法直接回传结果。", "warn");
      }
      render();
    }

    function wakeProtocol() {
      const payload = buildRunPayload();
      const url = `${state.scheme}://run?payload=${encodeURIComponent(JSON.stringify(payload))}`;
      addLog("INFO", "协议唤醒 SapWebLauncher：" + payload.tCode);
      addLog("WARN", "协议唤醒模式没有浏览器回传，结果状态需要 Bridge 或本地日志补齐。");
      location.href = url;
      toast("已发起协议唤醒", "info");
    }

    async function startRun() {
      if (state.role !== "executor" || state.executing) return;
      state.executing = true;
      resetRun();
      const payload = buildRunPayload();
      state.currentRun = { id: "RUN-" + new Date().toISOString().replace(/\D/g, "").slice(0, 14), payload };
      setStep(0, "done");
      addLog("INFO", "创建任务：" + state.currentRun.id);
      render();

      if (state.form.mode === "protocol") {
        setStep(1, "run");
        render();
        wakeProtocol();
        setTimeout(() => {
          setStep(1, "done");
          setStep(2, "run");
          addLog("WARN", "等待本机脚本执行。协议模式无法从浏览器确认结果。");
          finishLocalSimulation("协议唤醒已完成，结果需查看本地日志", "WARN");
        }, 850);
        return;
      }

      try {
        setStep(1, "run");
        render();
        const response = await fetch(state.bridgeBase.replace(/\/$/, "") + "/api/runs", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(payload)
        });
        if (!response.ok) throw new Error("Bridge HTTP " + response.status);
        const data = await response.json().catch(() => ({}));
        setStep(1, "done");
        setStep(2, "run");
        addLog("OK", "Bridge 已接收任务：" + (data.runId || state.currentRun.id));
        await pollRun(data.runId || state.currentRun.id);
      } catch (error) {
        addLog("WARN", "Bridge 未连接，进入本地演示流程：" + error.message);
        simulateRun();
      }
    }

    async function pollRun(runId) {
      for (let i = 0; i < 8; i++) {
        try {
          const response = await fetch(state.bridgeBase.replace(/\/$/, "") + "/api/runs/" + encodeURIComponent(runId));
          if (!response.ok) throw new Error("HTTP " + response.status);
          const data = await response.json();
          applyBridgeResult(data);
          if (["success", "failed", "done"].includes(String(data.status || "").toLowerCase())) return;
        } catch (error) {
          addLog("WARN", "轮询状态失败：" + error.message);
          break;
        }
        await new Promise(resolve => setTimeout(resolve, 1200));
      }
      simulateRun();
    }

    function applyBridgeResult(data) {
      setStep(2, "done");
      setStep(3, data.status === "failed" ? "fail" : "done");
      setStep(4, data.status === "failed" ? "fail" : "done");
      addLog(data.status === "failed" ? "ERR" : "OK", data.message || "Bridge 回传执行完成");
      if (data.reportRows) addLog("OK", "报表结果行数：" + data.reportRows);
      state.executing = false;
      render();
    }

    function simulateRun() {
      const flow = [
        () => { setStep(1, "done"); setStep(2, "run"); addLog("INFO", "启动 SAP GUI 并注入登录/事务码参数"); },
        () => { setStep(2, "done"); setStep(3, "run"); addLog("INFO", "执行 " + state.form.tCode + "，工厂 " + state.form.plant); },
        () => { setStep(3, "done"); setStep(4, "run"); addLog("OK", "采集到模拟报表结果：18 行"); },
        () => finishLocalSimulation("执行完成，已模拟推送钉钉通知", "OK")
      ];
      flow.forEach((fn, i) => setTimeout(() => { fn(); render(); }, 650 * (i + 1)));
    }

    function finishLocalSimulation(message, type) {
      setStep(2, state.steps[2].status === "pending" ? "done" : state.steps[2].status);
      setStep(3, state.steps[3].status === "pending" ? "done" : state.steps[3].status);
      setStep(4, type === "OK" ? "done" : "run");
      addLog(type, message);
      state.executing = false;
      toast(message, type === "OK" ? "ok" : "warn");
      render();
    }

    function buildRunPayload() {
      return {
        source: "netlify-static-portal",
        tCode: state.form.tCode,
        plant: state.form.plant,
        period: state.form.period,
        businessArea: state.form.businessArea,
        priority: state.form.priority,
        notify: state.form.notify,
        remark: state.form.remark,
        createdBy: state.user.name,
        createdAt: new Date().toISOString()
      };
    }

    function resetRun() {
      state.steps = state.steps.map(step => ({ ...step, status: "pending", time: "" }));
      state.logs = [];
    }

    function setStep(index, status) {
      state.steps[index].status = status;
      state.steps[index].time = nowTime();
    }

    function addLog(type, message) {
      state.logs.push({ type, message, time: nowTime() });
      if (state.logs.length > 80) state.logs.shift();
    }

    function exportHistory() {
      const rows = [["执行时间","任务名称","事务码","工厂","时长","状态","通知","结果摘要"], ...history.map(x => [x.time, x.task, x.tCode, x.plant, x.duration, x.status, x.notify, x.result])];
      const csv = rows.map(row => row.map(cell => `"${String(cell).replace(/"/g, '""')}"`).join(",")).join("\n");
      const blob = new Blob(["\ufeff" + csv], { type: "text/csv;charset=utf-8" });
      const link = document.createElement("a");
      link.href = URL.createObjectURL(blob);
      link.download = "sap-rpa-history.csv";
      link.click();
      URL.revokeObjectURL(link.href);
      toast("执行历史已导出", "ok");
    }

    function nowTime() {
      return new Date().toLocaleTimeString("zh-CN", { hour12: false });
    }

    function toast(message, type = "info") {
      const wrap = document.getElementById("toastWrap");
      const node = document.createElement("div");
      node.className = "toast " + type;
      node.textContent = message;
      wrap.appendChild(node);
      setTimeout(() => node.remove(), 3600);
    }

    render();
  </script>
</body>
</html>
