<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SAP 自动化执行门户</title>
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
  <style>
    * { box-sizing: border-box; }
    :root {
      --bg: #f5f7fa;
      --panel: #ffffff;
      --panel-soft: #fafcff;
      --line: #e5e7eb;
      --line-strong: #cbd5e1;
      --text: #1f2937;
      --muted: #667085;
      --nav: #001529;
      --nav-soft: #002140;
      --blue: #1890ff;
      --blue-dark: #096dd9;
      --green: #16a34a;
      --amber: #d97706;
      --red: #dc2626;
      --cyan: #0891b2;
      --shadow: 0 8px 24px rgba(15, 23, 42, 0.08);
      --radius: 8px;
    }
    html, body { margin: 0; min-height: 100%; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", Arial, sans-serif;
      letter-spacing: 0;
    }
    button, input, select, textarea { font: inherit; }
    button { cursor: pointer; }
    .icon { width: 17px; height: 17px; flex: 0 0 auto; }
    .hidden { display: none !important; }

    .login-page {
      min-height: 100vh;
      display: grid;
      grid-template-columns: minmax(360px, 440px) minmax(0, 1fr);
      background:
        linear-gradient(135deg, rgba(24, 144, 255, .88), rgba(54, 207, 201, .72)),
        url("https://images.unsplash.com/photo-1517048676732-d65bc937f952?auto=format&fit=crop&w=1600&q=80") center/cover;
    }
    .login-panel {
      background: rgba(255,255,255,.98);
      padding: 46px 40px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      border-right: 1px solid rgba(255,255,255,.36);
    }
    .login-brand { display: flex; align-items: center; gap: 12px; margin-bottom: 32px; }
    .brand-mark {
      width: 42px; height: 42px; border-radius: 8px;
      background: var(--blue); color: #fff; display: grid; place-items: center;
    }
    .login-brand h1 { margin: 0; font-size: 24px; line-height: 1.25; }
    .login-brand p { margin: 5px 0 0; color: var(--muted); font-size: 13px; }
    .login-form { display: grid; gap: 14px; }
    .login-side {
      color: #fff;
      padding: 64px;
      display: flex;
      flex-direction: column;
      justify-content: flex-end;
      min-height: 520px;
    }
    .login-side h2 { margin: 0 0 14px; font-size: 40px; line-height: 1.16; }
    .login-side p { margin: 0; max-width: 650px; color: rgba(255,255,255,.88); line-height: 1.8; }
    .divider {
      display: grid; grid-template-columns: 1fr auto 1fr; align-items: center; gap: 10px;
      color: var(--muted); font-size: 12px; margin: 4px 0;
    }
    .divider::before, .divider::after { content: ""; height: 1px; background: var(--line); }

    .app-shell { min-height: 100vh; display: grid; grid-template-columns: 220px minmax(0, 1fr); }
    .sidebar {
      position: sticky; top: 0; height: 100vh;
      background: var(--nav);
      color: #fff;
      display: flex;
      flex-direction: column;
    }
    .logo {
      height: 62px;
      padding: 0 18px;
      display: flex;
      align-items: center;
      gap: 10px;
      border-bottom: 1px solid rgba(255,255,255,.1);
      font-weight: 700;
    }
    .logo .brand-mark { width: 34px; height: 34px; }
    .nav { padding: 12px; display: grid; gap: 5px; }
    .nav button {
      height: 42px; width: 100%;
      border: 0; border-radius: var(--radius);
      background: transparent; color: #cbd5e1;
      display: flex; align-items: center; gap: 10px;
      padding: 0 12px; text-align: left;
    }
    .nav button:hover, .nav button.active { background: var(--nav-soft); color: #fff; }
    .nav button.active { box-shadow: inset 3px 0 0 var(--blue); }
    .sidebar-footer {
      margin-top: auto; padding: 16px;
      border-top: 1px solid rgba(255,255,255,.1);
      color: #94a3b8; font-size: 12px; line-height: 1.7;
    }
    .main { min-width: 0; padding: 18px 22px 32px; }
    .topbar {
      min-height: 58px;
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      box-shadow: 0 2px 10px rgba(15, 23, 42, .04);
      padding: 0 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      margin-bottom: 16px;
    }
    .breadcrumb { color: var(--muted); font-size: 13px; }
    .page-title { font-weight: 700; color: var(--text); }
    .top-actions { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; justify-content: flex-end; }
    .avatar {
      width: 32px; height: 32px; border-radius: 50%;
      background: #e6f7ff; color: #0958d9;
      display: grid; place-items: center;
      font-weight: 700; font-size: 13px;
    }

    .btn {
      min-height: 36px;
      border: 1px solid var(--line-strong);
      border-radius: var(--radius);
      background: #fff;
      color: var(--text);
      padding: 0 12px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 7px;
      white-space: nowrap;
      text-decoration: none;
    }
    .btn:hover { border-color: var(--blue); color: var(--blue); }
    .btn.primary { background: var(--blue); border-color: var(--blue); color: #fff; box-shadow: 0 2px 8px rgba(24,144,255,.28); }
    .btn.primary:hover { background: var(--blue-dark); border-color: var(--blue-dark); color: #fff; box-shadow: 0 4px 12px rgba(24,144,255,.34); }
    .btn.green { background: var(--green); border-color: var(--green); color: #fff; }
    .btn.red { background: var(--red); border-color: var(--red); color: #fff; }
    .btn.small { min-height: 30px; padding: 0 9px; font-size: 12px; }
    .btn:disabled { opacity: .58; cursor: not-allowed; }
    input, select, textarea {
      width: 100%;
      border: 1px solid var(--line-strong);
      border-radius: var(--radius);
      background: #fff;
      color: var(--text);
      min-height: 38px;
      padding: 9px 11px;
      outline: none;
    }
    input:focus, select:focus, textarea:focus {
      border-color: var(--blue);
      box-shadow: 0 0 0 3px rgba(24, 144, 255, .12);
    }
    label { color: #344054; font-size: 13px; font-weight: 600; }
    .field { display: grid; gap: 7px; }
    .form-grid { display: grid; grid-template-columns: repeat(3, minmax(0, 1fr)); gap: 14px; }
    .form-grid .span-2 { grid-column: span 2; }
    .form-grid .span-3 { grid-column: 1 / -1; }
    .radio-row, .check-row { display: flex; gap: 12px; flex-wrap: wrap; }
    .radio-chip {
      min-height: 38px;
      display: inline-flex;
      align-items: center;
      gap: 7px;
      border: 1px solid var(--line-strong);
      border-radius: var(--radius);
      padding: 0 10px;
      background: #fff;
      font-weight: 500;
    }
    .radio-chip input { width: auto; min-height: 0; }
    .select-grid { display: grid; grid-template-columns: 220px minmax(0, 1fr); gap: 14px; align-items: start; }
    .factory-list { display: grid; gap: 8px; }
    .factory-button {
      border: 1px solid var(--line-strong);
      border-radius: var(--radius);
      background: #fff;
      min-height: 42px;
      padding: 0 12px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      color: var(--text);
      text-align: left;
    }
    .factory-button:hover, .factory-button.active { border-color: #91d5ff; background: #e6f7ff; color: #0958d9; }
    .plant-picker { display: grid; grid-template-columns: repeat(auto-fit, minmax(190px, 1fr)); gap: 10px; }
    .checkbox-card {
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: #fff;
      padding: 11px 12px;
      display: grid;
      grid-template-columns: auto minmax(0, 1fr);
      gap: 9px;
      align-items: start;
      min-height: 70px;
    }
    .checkbox-card input { width: auto; min-height: 0; margin-top: 3px; }
    .checkbox-card strong { display: block; color: #102a43; }
    .checkbox-card span { display: block; color: var(--muted); font-size: 12px; line-height: 1.45; margin-top: 3px; }
    .area-chips { display: flex; gap: 8px; flex-wrap: wrap; }
    .area-chip {
      min-height: 28px;
      display: inline-flex;
      align-items: center;
      border-radius: 4px;
      border: 1px solid #91d5ff;
      background: #e6f7ff;
      color: #0958d9;
      padding: 0 9px;
      font-size: 12px;
      font-weight: 600;
    }
    .run-summary {
      border: 1px solid #91d5ff;
      background: #f0f8ff;
      border-radius: var(--radius);
      padding: 12px;
      display: grid;
      gap: 9px;
      font-size: 13px;
    }
    .summary-row { display: grid; grid-template-columns: 96px minmax(0, 1fr); gap: 10px; align-items: start; }
    .summary-row span:first-child { color: var(--muted); }
    .summary-row strong { color: #102a43; }

    .panel {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      box-shadow: 0 2px 10px rgba(15, 23, 42, .04);
      overflow: hidden;
    }
    .panel + .panel { margin-top: 16px; }
    .panel-header {
      min-height: 52px;
      padding: 0 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      border-bottom: 1px solid var(--line);
      background: #fafcff;
    }
    .panel-title { display: flex; align-items: center; gap: 9px; font-weight: 700; }
    .panel-sub { color: var(--muted); font-size: 12px; margin-top: 2px; line-height: 1.5; }
    .panel-body { padding: 16px; }
    .grid { display: grid; gap: 16px; }
    .grid.cols-2 { grid-template-columns: minmax(0, 1fr) minmax(0, 1fr); }
    .grid.cols-3 { grid-template-columns: repeat(3, minmax(0, 1fr)); }
    .grid.cols-4 { grid-template-columns: repeat(4, minmax(0, 1fr)); }
    .metric {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      padding: 15px;
      display: grid;
      gap: 7px;
    }
    .metric .label { color: var(--muted); font-size: 12px; }
    .metric .value { font-size: 23px; font-weight: 800; }
    .metric .hint { color: var(--muted); font-size: 12px; line-height: 1.45; }
    .quick-actions { display: grid; grid-template-columns: repeat(4, minmax(150px, 1fr)); gap: 12px; }
    .action-card {
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: #fff;
      padding: 14px;
      display: grid;
      gap: 10px;
      transition: border-color .16s, box-shadow .16s, transform .16s;
    }
    .action-card:hover { border-color: #91d5ff; box-shadow: var(--shadow); transform: translateY(-1px); }
    .action-top { display: flex; justify-content: space-between; align-items: flex-start; gap: 8px; }
    .action-name { font-weight: 800; font-size: 16px; }
    .action-desc { color: var(--muted); font-size: 12px; margin-top: 4px; line-height: 1.5; }
    .workflow-chain {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 10px;
    }
    .workflow-step {
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: #fff;
      padding: 12px;
      min-height: 92px;
      display: grid;
      align-content: start;
      gap: 7px;
    }
    .workflow-step .step-head { display: flex; align-items: center; justify-content: space-between; gap: 8px; }
    .workflow-step .step-code { font-weight: 800; color: #102a43; }
    .workflow-step .step-desc { color: var(--muted); font-size: 12px; line-height: 1.55; }
    .executor-stack { display: grid; gap: 10px; }
    .executor-row {
      min-height: 40px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: #fff;
      padding: 8px 10px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      font-size: 13px;
    }
    .launch-link {
      border: 1px solid #91d5ff;
      background: #e6f7ff;
      border-radius: var(--radius);
      padding: 10px 12px;
      color: #0958d9;
      font-family: Consolas, "Microsoft YaHei UI", monospace;
      font-size: 12px;
      overflow-wrap: anywhere;
      line-height: 1.55;
    }
    .badge, .tag {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      min-height: 22px;
      border-radius: 999px;
      padding: 0 8px;
      font-size: 12px;
      border: 1px solid transparent;
      white-space: nowrap;
    }
    .badge.viewer { background: #e6f7ff; color: #0958d9; border-color: #91d5ff; }
    .badge.executor { background: #f6ffed; color: #389e0d; border-color: #b7eb8f; }
    .tag.ok { background: #f6ffed; color: #389e0d; border-color: #b7eb8f; }
    .tag.info { background: #e6f7ff; color: #0958d9; border-color: #91d5ff; }
    .tag.warn { background: #fffbe6; color: #ad6800; border-color: #ffe58f; }
    .tag.err { background: #fff1f0; color: #cf1322; border-color: #ffa39e; }
    .notice {
      border: 1px solid #91d5ff;
      background: #e6f7ff;
      color: #0958d9;
      border-radius: var(--radius);
      padding: 12px 14px;
      line-height: 1.65;
      font-size: 13px;
    }
    .notice.warn { border-color: #ffe58f; background: #fffbe6; color: #ad6800; }
    .notice.ok { border-color: #b7eb8f; background: #f6ffed; color: #237804; }
    .table-wrap { overflow-x: auto; }
    table { width: 100%; border-collapse: collapse; min-width: 760px; }
    th, td { padding: 11px 12px; border-bottom: 1px solid var(--line); text-align: left; font-size: 13px; vertical-align: middle; }
    th { background: #f5f7fa; color: #475467; font-weight: 700; }
    tbody tr:hover { background: #f5f8ff; }
    .tabs { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 14px; }
    .tab {
      border: 1px solid var(--line-strong);
      background: #fff;
      border-radius: var(--radius);
      min-height: 34px;
      padding: 0 11px;
      display: inline-flex;
      align-items: center;
      gap: 6px;
    }
    .tab.active { color: var(--blue); border-color: #91d5ff; background: #e6f7ff; }
    .steps { display: grid; gap: 10px; }
    .step {
      display: grid;
      grid-template-columns: 28px minmax(0, 1fr) auto;
      gap: 10px;
      align-items: center;
      min-height: 38px;
    }
    .step-icon {
      width: 24px; height: 24px; border-radius: 50%;
      display: grid; place-items: center;
      background: #e5e7eb; color: #64748b;
      font-size: 12px; font-weight: 800;
    }
    .step.done .step-icon { background: #dcfce7; color: var(--green); }
    .step.run .step-icon { background: #dbeafe; color: var(--blue); animation: pulse 1.2s infinite; }
    .step.fail .step-icon { background: #fee2e2; color: var(--red); }
    .step-text { font-size: 13px; }
    .step-time { font-size: 12px; color: var(--muted); }
    @keyframes pulse { 0%,100% { transform: scale(1); opacity: 1; } 50% { transform: scale(.92); opacity: .7; } }
    .log {
      background: #101828;
      color: #d0d5dd;
      border-radius: var(--radius);
      padding: 12px;
      height: 248px;
      overflow: auto;
      font-family: Consolas, "Microsoft YaHei UI", monospace;
      font-size: 12px;
      line-height: 1.7;
    }
    .log-line { border-bottom: 1px solid rgba(255,255,255,.07); padding: 2px 0; }
    .log-time { color: #86efac; margin-right: 8px; }
    .log .INFO { color: #93c5fd; }
    .log .OK { color: #86efac; }
    .log .WARN { color: #fcd34d; }
    .log .ERR { color: #fca5a5; }
    .modal-backdrop {
      position: fixed; inset: 0; z-index: 20;
      background: rgba(15, 23, 42, .48);
      display: grid;
      place-items: center;
      padding: 18px;
    }
    .modal {
      width: min(720px, 100%);
      max-height: 86vh;
      overflow: auto;
      background: #fff;
      border-radius: var(--radius);
      box-shadow: 0 24px 80px rgba(0,0,0,.25);
    }
    .modal-header, .modal-footer {
      min-height: 56px;
      padding: 0 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-bottom: 1px solid var(--line);
    }
    .modal-footer { border-top: 1px solid var(--line); border-bottom: 0; justify-content: flex-end; gap: 10px; }
    .modal-body { padding: 16px; }
    .toast-wrap {
      position: fixed;
      right: 18px;
      bottom: 18px;
      z-index: 30;
      display: grid;
      gap: 8px;
    }
    .toast {
      min-width: 260px;
      max-width: 420px;
      background: #fff;
      border: 1px solid var(--line);
      border-left: 4px solid var(--blue);
      box-shadow: var(--shadow);
      border-radius: var(--radius);
      padding: 10px 12px;
      color: var(--text);
      line-height: 1.5;
      font-size: 13px;
    }
    .toast.ok { border-left-color: var(--green); }
    .toast.warn { border-left-color: var(--amber); }
    .toast.err { border-left-color: var(--red); }
    @media (max-width: 1120px) {
      .quick-actions, .workflow-chain, .grid.cols-4 { grid-template-columns: repeat(2, minmax(0, 1fr)); }
      .grid.cols-3, .grid.cols-2 { grid-template-columns: 1fr; }
      .form-grid { grid-template-columns: 1fr; }
      .form-grid .span-2 { grid-column: auto; }
      .form-grid .span-3 { grid-column: auto; }
      .select-grid { grid-template-columns: 1fr; }
    }
    @media (max-width: 760px) {
      .login-page { grid-template-columns: 1fr; }
      .login-side { display: none; }
      .login-panel { min-height: 100vh; padding: 28px 20px; }
      .app-shell { grid-template-columns: 1fr; }
      .sidebar { position: static; height: auto; }
      .nav { grid-template-columns: repeat(2, minmax(0, 1fr)); }
      .sidebar-footer { display: none; }
      .main { padding: 12px; }
      .topbar { align-items: flex-start; flex-direction: column; padding: 12px; }
      .quick-actions, .workflow-chain, .grid.cols-4 { grid-template-columns: 1fr; }
      .plant-picker { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <div id="app"></div>
  <div id="toastWrap" class="toast-wrap"></div>

  <script>
    const state = {

      }
    };

    const tCodes = [
      { code: "ZFI019NL", name: "周损益保存导出", module: "FI", timeout: 300, retry: 3, enabled: true, script: "zfi019nl" },

        <div class="run-summary">
          <div class="summary-row"><span>厂区组</span><strong>${esc(payload.factoryGroupName)}</strong></div>
          <div class="summary-row"><span>工厂</span><div class="area-chips">${payload.plants.map(x => `<span class="area-chip">${esc(x)}</span>`).join("") || `<span class="area-chip">未选择</span>`}</div></div>
          <div class="summary-row"><span>业务范围</span><div class="area-chips">${payload.businessAreas.map(x => `<span class="area-chip">${esc(x)}</span>`).join("") || `<span class="area-chip">无</span>`}</div></div>
          <div class="summary-row"><span>执行策略</span><strong>${esc(strategyText)}</strong></div>
        </div>
      `;
    }

    function unique(list) {
      return [...new Set((list || []).filter(Boolean))];
    }

    function getFactoryGroup(id) {
      return factoryGroups.find(group => group.id === id) || factoryGroups[0];
    }

    function getBusinessAreaName(code) {
      return (businessAreaCatalog.find(item => item.code === code) || {}).name || "";
    }

    function getDefaultPlantsForTCode(tCode, groupId = state.form.factoryGroup) {
      const group = getFactoryGroup(groupId);
      if (tCode === "ZFI072") return unique([...procurementPlants, ...group.zfi072Plants]);
      if (tCode === "ZCO019") return unique(group.zco019Plants);
      return unique(group.plants);
    }

    function getBusinessAreasForSelection(tCode, selectedPlants = state.form.plants, groupId = state.form.factoryGroup) {
      const group = getFactoryGroup(groupId);
      if (!selectedPlants.length) return [];
      if (tCode === "ZFI019NL") return unique(group.zfi019nlAreas);
      if (tCode === "ZFI080") return unique(group.zfi080Areas);
      if (tCode === "ZCO019" || tCode === "ZFI057") {
        return unique(selectedPlants.map(code => plantCatalog[code]?.area));
      }
      return unique(selectedPlants.map(code => plantCatalog[code]?.area));
    }

    function syncExecutionDefaults(forcePlants = false) {
      if (!Array.isArray(state.form.plants)) state.form.plants = getDefaultPlantsForTCode(state.form.tCode);
      if (!state.form.factoryGroup) state.form.factoryGroup = "PINGHU_30";
      if (forcePlants) {
        state.form.plants = getDefaultPlantsForTCode(state.form.tCode);
      }
      state.form.plants = unique(state.form.plants);
      state.form.businessAreas = getBusinessAreasForSelection(state.form.tCode, state.form.plants);
    }

    function renderStep(step, i) {
      const cls = step.status === "done" ? "done" : step.status === "run" ? "run" : step.status === "fail" ? "fail" : "";
      const mark = step.status === "done" ? "✓" : step.status === "fail" ? "!" : (i + 1);
      return `<div class="step ${cls}"><span class="step-icon">${mark}</span><span class="step-text">${esc(step.text)}</span><span class="step-time">${esc(step.time)}</span></div>`;
    }

    function renderLog(line) {
      return `<div class="log-line"><span class="log-time">[${esc(line.time)}]</span><span class="${esc(line.type)}">${esc(line.message)}</span></div>`;

              <div class="modal-body">
                <div class="notice">当前推荐注册 <strong>sap-rpa://</strong>，并保留兼容旧版 <strong>sap-zck://</strong>。本地目录已生成 PowerShell 和 .reg 文件。</div>
                <div style="height:12px"></div>
                <div class="launch-link">D:\\工作\\网页启动登录\\register.ps1<br>D:\\工作\\网页启动登录\\register_sap_rpa.reg</div>
              </div>
              <div class="modal-footer"><button class="btn primary" data-action="close-modal">关闭</button></div>

          <div class="modal-backdrop">

              <div class="modal-body">
                <div class="form-grid">

                  <div class="field"><label>厂区组</label><select id="scheduleFactoryGroup">${factoryGroups.map(group => `<option value="${group.id}" ${state.scheduleForm.factoryGroup === group.id ? "selected" : ""}>${group.name}</option>`).join("")}</select></div>

                  <div class="field span-2"><label>通知规则</label><div class="check-row"><label class="radio-chip"><input type="checkbox" checked>执行前提醒</label><label class="radio-chip"><input type="checkbox" checked>成功通知</label><label class="radio-chip"><input type="checkbox" checked>失败告警</label></div></div>
                </div>
              </div>
              <div class="modal-footer"><button class="btn" data-action="close-modal">取消</button><button class="btn primary" data-action="save-schedule">${icon("save")}保存任务</button></div>

          <div class="modal-backdrop">

              <div class="modal-header"><strong>${row.id} 日志详情</strong><button class="btn small" data-action="close-modal">${icon("x")}关闭</button></div>

    function bindEvents() {
      document.querySelectorAll("[data-page]").forEach(btn => btn.addEventListener("click", () => { state.page = btn.dataset.page; render(); }));
      document.querySelectorAll("[data-config-tab]").forEach(btn => btn.addEventListener("click", () => { state.activeConfigTab = btn.dataset.configTab; render(); }));
      document.querySelectorAll("[data-bind]").forEach(input => {
        const update = () => {
          state.form[input.dataset.bind] = input.value;
          if (input.dataset.bind === "tCode" || input.dataset.bind === "factoryGroup") {
            syncExecutionDefaults(true);
            render();
          }
        };
        input.addEventListener("input", update);
        input.addEventListener("change", update);
      });
      document.querySelectorAll("input[name='mode']").forEach(input => input.addEventListener("change", () => { state.form.mode = input.value; render(); }));
      document.querySelectorAll("input[name='runStrategy']").forEach(input => input.addEventListener("change", () => { state.form.runStrategy = input.value; render(); }));
      document.querySelectorAll("[data-plant-code]").forEach(input => input.addEventListener("change", () => {
        const code = input.dataset.plantCode;
        state.form.plants = input.checked ? unique([...state.form.plants, code]) : state.form.plants.filter(item => item !== code);
        syncExecutionDefaults(false);
        render();
      }));
      const notify = document.getElementById("notify");
      if (notify) notify.addEventListener("change", () => { state.form.notify = notify.checked; });
      document.querySelectorAll("[data-action]").forEach(el => el.addEventListener("click", () => handleAction(el)));
    }

    function handleAction(el) {
      const action = el.dataset.action;
      if (action === "login" || action === "dingtalk-login") return login();
      if (action === "logout") return logout();
      if (action === "toggle-role") return toggleRole();
      if (action === "go-execute") return goExecute(el.dataset.tcode);
      if (action === "check-bridge") return checkBridge();
      if (action === "wake-protocol") return wakeProtocol();
      if (action === "start-run") return startRun();
      if (action === "select-factory-group") {
        state.form.factoryGroup = el.dataset.group;
        syncExecutionDefaults(true);
        return render();
      }
      if (action === "select-all-plants") {
        state.form.plants = getDefaultPlantsForTCode(state.form.tCode);
        syncExecutionDefaults(false);
        return render();
      }
      if (action === "clear-plants") {
        state.form.plants = [];
        syncExecutionDefaults(false);
        return render();
      }
      if (action === "save-bridge") return saveBridge();
      if (action === "save-settings") return saveSettings();
      if (action === "open-register-help") { state.modal = "register"; return render(); }
      if (action === "open-schedule-modal") { state.modal = "schedule"; return render(); }
      if (action === "close-modal") { state.modal = null; return render(); }
      if (action === "save-schedule") { state.modal = null; toast("定时任务已保存到本地示例配置", "ok"); return render(); }
      if (action === "test-robot") return toast("已模拟发送钉钉测试消息", "ok");
      if (action === "toast-edit") return toast("编辑弹窗后续接入后台保存", "info");
      if (action === "export-history") return exportHistory();
      if (action === "view-log") { state.modal = "log:" + el.dataset.run; return render(); }
    }

    function login() {
      const account = document.getElementById("loginAccount")?.value || "张三";
      state.user.name = account.trim() || "张三";
      localStorage.setItem("portalUser", state.user.name);
      localStorage.setItem("portalLoggedIn", "1");
      state.loggedIn = true;
      toast("登录成功", "ok");
      render();
    }

    function logout() {
      localStorage.removeItem("portalLoggedIn");
      state.loggedIn = false;
      state.page = "dashboard";
      render();
    }

    function toggleRole() {
      state.role = state.role === "viewer" ? "executor" : "viewer";
      localStorage.setItem("portalRole", state.role);
      toast("已切换为" + (state.role === "viewer" ? "查询员" : "执行员"), "ok");
      render();
    }

    function goExecute(tCode) {
      state.form.tCode = tCode;
      state.selectedTCode = tCode;
      state.page = "execute";
      render();
    }

    function saveBridge() {
      const bridge = document.getElementById("bridgeBase")?.value?.trim();
      const scheme = document.getElementById("scheme")?.value?.trim();
      if (bridge) state.bridgeBase = bridge;
      if (scheme) state.scheme = scheme;
      localStorage.setItem("bridgeBase", state.bridgeBase);
      localStorage.setItem("scheme", state.scheme);
      toast("本机执行器配置已保存", "ok");
      render();
    }

    function saveSettings() {
      const bridge = document.getElementById("settingsBridge")?.value?.trim();
      const scheme = document.getElementById("settingsScheme")?.value?.trim();
      const mode = document.getElementById("settingsMode")?.value;
      const user = document.getElementById("settingsUser")?.value?.trim();
      if (bridge) state.bridgeBase = bridge;
      if (scheme) state.scheme = scheme;
      if (mode) state.form.mode = mode;
      if (user) state.user.name = user;
      localStorage.setItem("bridgeBase", state.bridgeBase);
      localStorage.setItem("scheme", state.scheme);
      localStorage.setItem("portalUser", state.user.name);
      toast("设置已保存", "ok");
      render();
    }

    async function checkBridge() {
      toast("正在检测本机 Bridge", "info");
      try {
        const response = await fetch(state.bridgeBase.replace(/\/$/, "") + "/health", { method: "GET" });
        if (!response.ok) throw new Error("HTTP " + response.status);
        state.bridgeStatus = "在线";
        toast("Bridge 在线，可以回传执行状态", "ok");
      } catch (error) {
        state.bridgeStatus = "离线";
        toast("未检测到 Bridge。协议唤醒仍可启动本机程序，但无法直接回传结果。", "warn");
      }
      render();
    }

    function wakeProtocol() {
      const url = buildProtocolUrl();
      const payload = buildRunPayload();
      addLog("INFO", "协议唤醒 SapWebLauncher：" + payload.tcode + "，工厂 " + payload.plantsCsv);
      addLog("WARN", "协议唤醒模式没有浏览器回传，结果需要查看本地日志或 Bridge。");
      location.href = url;
      toast("已发起协议唤醒", "info");
    }

    async function startRun() {
      if (state.role !== "executor" || state.executing) return;
      state.executing = true;
      resetRun();
      const payload = buildRunPayload();
      state.currentRun = { id: "RUN-" + new Date().toISOString().replace(/\D/g, "").slice(0, 14), payload };
      setStep(0, "done");
      addLog("INFO", "创建任务：" + state.currentRun.id);
      addLog("INFO", "执行范围：" + payload.factoryGroupName + " / 工厂 " + payload.plantsCsv + " / 业务范围 " + payload.businessAreasCsv);
      render();

      if (state.form.mode === "protocol") {
        setStep(1, "run");
        render();
        wakeProtocol();
        setTimeout(() => {
          setStep(1, "done");
          setStep(2, "run");
          addLog("WARN", "等待本机脚本执行。协议模式无法从浏览器确认结果。");
          finishLocalSimulation("协议唤醒已完成，结果请查看本地日志", "WARN");
        }, 850);
        return;
      }

      try {
        setStep(1, "run");
        render();
        const response = await fetch(state.bridgeBase.replace(/\/$/, "") + "/api/runs", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(payload)
        });
        if (!response.ok) throw new Error("Bridge HTTP " + response.status);
        const data = await response.json().catch(() => ({}));
        setStep(1, "done");
        setStep(2, "run");
        addLog("OK", "Bridge 已接收任务：" + (data.runId || state.currentRun.id));
        await pollRun(data.runId || state.currentRun.id);
      } catch (error) {
        addLog("WARN", "Bridge 未连接，进入本地演示流程：" + error.message);
        simulateRun();
      }
    }

    async function pollRun(runId) {
      for (let i = 0; i < 8; i++) {
        try {
          const response = await fetch(state.bridgeBase.replace(/\/$/, "") + "/api/runs/" + encodeURIComponent(runId));
          if (!response.ok) throw new Error("HTTP " + response.status);
          const data = await response.json();
          applyBridgeResult(data);
          if (["success", "failed", "done"].includes(String(data.status || "").toLowerCase())) return;
        } catch (error) {
          addLog("WARN", "轮询状态失败：" + error.message);
          break;
        }
        await new Promise(resolve => setTimeout(resolve, 1200));
      }
      simulateRun();
    }

    function applyBridgeResult(data) {
      setStep(2, "done");
      setStep(3, data.status === "failed" ? "fail" : "done");
      setStep(4, data.status === "failed" ? "fail" : "done");
      addLog(data.status === "failed" ? "ERR" : "OK", data.message || "Bridge 回传执行完成");
      if (data.reportRows) addLog("OK", "报表结果行数：" + data.reportRows);
      state.executing = false;
      render();
    }

    function simulateRun() {
      const payload = buildRunPayload();
      const strategyText = payload.runStrategy === "byPlant" ? "按工厂逐个执行" : "合并参数执行";
      const flow = [
        () => { setStep(1, "done"); setStep(2, "run"); addLog("INFO", "启动 SAP GUI 并注入登录/事务码参数"); },
        () => { setStep(2, "done"); setStep(3, "run"); addLog("INFO", "执行 " + payload.tcode + "，" + strategyText + "：" + payload.plantsCsv); },
        () => { setStep(3, "done"); setStep(4, "run"); addLog("OK", "业务范围参数：" + payload.businessAreasCsv); },
        () => finishLocalSimulation("执行完成，已模拟推送钉钉通知", "OK")
      ];
      flow.forEach((fn, i) => setTimeout(() => { fn(); render(); }, 650 * (i + 1)));
    }

    function finishLocalSimulation(message, type) {
      setStep(2, state.steps[2].status === "pending" ? "done" : state.steps[2].status);
      setStep(3, state.steps[3].status === "pending" ? "done" : state.steps[3].status);
      setStep(4, type === "OK" ? "done" : "run");
      addLog(type, message);
      state.executing = false;
      toast(message, type === "OK" ? "ok" : "warn");
      render();
    }

    function buildRunPayload() {
      syncExecutionDefaults(false);
      const t = tCodes.find(x => x.code === state.form.tCode) || tCodes[0];
      const group = getFactoryGroup(state.form.factoryGroup);
      const selectedPlants = unique(state.form.plants);
      const selectedAreas = getBusinessAreasForSelection(state.form.tCode, selectedPlants, state.form.factoryGroup);
      return {
        source: "netlify-static-portal",
        action: "run",
        tcode: state.form.tCode,
        script: t.script,
        factoryGroup: state.form.factoryGroup,
        factoryGroupName: group.name,
        plants: selectedPlants,
        plant: selectedPlants[0] || "",
        plantsCsv: selectedPlants.join(","),
        period: state.form.period,
        businessAreas: selectedAreas,
        businessArea: selectedAreas[0] || "",
        businessAreasCsv: selectedAreas.join(","),
        weekEnd: state.form.weekEnd,
        runStrategy: state.form.runStrategy,
        notify: state.form.notify,
        remark: state.form.remark,
        createdBy: state.user.name,
        createdAt: new Date().toISOString()
      };
    }

    function buildProtocolUrl() {
      const p = buildRunPayload();
      const params = new URLSearchParams({
        action: "run",
        tcode: p.tcode,
        script: p.script,
        system: "Fiori",
        client: "400",
        user: "UI5035",
        pw: "fiori666",
        lang: "ZH",
        sysnr: "04",
        plant: p.plant,
        plants: p.plantsCsv,
        period: p.period,
        businessArea: p.businessArea,
        businessAreas: p.businessAreasCsv,
        factoryGroup: p.factoryGroup,
        runStrategy: p.runStrategy,
        weekEnd: p.weekEnd
      });
      return `${state.scheme}://run?${params.toString()}`;
    }

    function resetRun() {
      state.steps = state.steps.map(step => ({ ...step, status: "pending", time: "" }));
      state.logs = [];
    }

    function setStep(index, status) {
      state.steps[index].status = status;
      state.steps[index].time = nowTime();
    }

    function addLog(type, message) {
      state.logs.push({ type, message, time: nowTime() });
      if (state.logs.length > 80) state.logs.shift();
    }

    function exportHistory() {
      const rows = [["执行时间","任务名称","事务码","工厂","时长","状态","通知","结果摘要"], ...history.map(x => [x.time, x.task, x.tCode, x.plant, x.duration, x.status, x.notify, x.result])];
      const csv = rows.map(row => row.map(cell => `"${String(cell).replace(/"/g, '""')}"`).join(",")).join("\n");
      const blob = new Blob(["\ufeff" + csv], { type: "text/csv;charset=utf-8" });
      const link = document.createElement("a");
      link.href = URL.createObjectURL(blob);
      link.download = "sap-rpa-history.csv";
      link.click();
      URL.revokeObjectURL(link.href);
      toast("执行历史已导出", "ok");
    }

    function nowTime() {
      return new Date().toLocaleTimeString("zh-CN", { hour12: false });
    }

    function toast(message, type = "info") {
      const wrap = document.getElementById("toastWrap");
      const node = document.createElement("div");
      node.className = "toast " + type;
      node.textContent = message;
      wrap.appendChild(node);
      setTimeout(() => node.remove(), 3600);
    }

    render();
  </script>
</body>
</html>
